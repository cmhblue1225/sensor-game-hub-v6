<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📱 Sensor Controller v6.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --background: #0f172a;
            --surface: #1e293b;
            --card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #475569;
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }
        
        /* 헤더 */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .header-content {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        /* 메인 컨테이너 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1.5rem;
            min-height: calc(100vh - 120px);
        }
        
        /* 연결 상태 */
        .connection-status {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .status-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.75rem;
            background: var(--error);
            transition: background-color 0.3s ease;
        }
        
        .status-indicator.connected {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
        }
        
        .status-text {
            font-size: 1rem;
            font-weight: 600;
            display: inline-block;
            vertical-align: middle;
        }
        
        /* 세션 입력 */
        .session-input-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary);
        }
        
        .input-group {
            margin-bottom: 1rem;
        }
        
        .input-label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .session-input {
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            background: var(--background);
            border: 2px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text-primary);
            letter-spacing: 0.2em;
            transition: border-color 0.3s ease;
        }
        
        .session-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .session-input::placeholder {
            color: var(--text-muted);
            letter-spacing: normal;
        }
        
        .connect-button {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .connect-button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .connect-button:active {
            transform: translateY(0);
        }
        
        .connect-button:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
        }
        
        /* QR 스캐너 */
        .qr-scanner-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .qr-button {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .qr-button:hover {
            background: #7c3aed;
            transform: translateY(-2px);
        }
        
        /* 게임 정보 */
        .game-info {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: none;
        }
        
        .game-info.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .game-type-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--primary);
            color: white;
            border-radius: 1rem;
            margin-bottom: 1rem;
        }
        
        .game-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .detail-item {
            text-align: center;
        }
        
        .detail-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }
        
        .detail-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        /* 센서 상태 */
        .sensor-status {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: none;
        }
        
        .sensor-status.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .sensor-item {
            text-align: center;
            padding: 1rem;
            background: var(--background);
            border-radius: 0.5rem;
            border: 1px solid var(--border);
        }
        
        .sensor-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .sensor-value {
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: var(--primary);
        }
        
        /* 활동 표시 */
        .activity-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 4px solid var(--primary);
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.1);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .activity-indicator.active {
            display: flex;
            animation: pulse 1s infinite;
        }
        
        .activity-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary);
            text-align: center;
        }
        
        /* 메시지 */
        .message {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        
        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }
        
        .message.warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning);
            color: var(--warning);
        }
        
        .message.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        /* 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        /* 반응형 */
        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            
            .session-input-section,
            .qr-scanner-section,
            .game-info,
            .sensor-status {
                padding: 1rem;
            }
            
            .sensor-grid {
                grid-template-columns: 1fr;
            }
            
            .game-details {
                grid-template-columns: 1fr;
            }
        }
        
        /* 숨김 클래스 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <div class="header">
        <div class="header-content">
            <div class="logo">📱 Sensor Controller v6.0</div>
            <div class="subtitle">모바일 센서를 게임 컨트롤러로 사용하세요</div>
        </div>
    </div>
    
    <!-- 메인 컨테이너 -->
    <div class="container">
        <!-- 연결 상태 -->
        <div class="connection-status">
            <div class="status-indicator" id="statusIndicator"></div>
            <span class="status-text" id="statusText">서버 연결 중...</span>
        </div>
        
        <!-- 메시지 -->
        <div class="message" id="message"></div>
        
        <!-- 세션 입력 -->
        <div class="session-input-section" id="sessionInputSection">
            <div class="section-title">🎮 게임 세션 연결</div>
            <div class="input-group">
                <label class="input-label">4자리 세션 코드 입력</label>
                <input type="text" 
                       class="session-input" 
                       id="sessionInput" 
                       placeholder="0000"
                       maxlength="4"
                       pattern="[0-9]{4}"
                       inputmode="numeric">
            </div>
            <button class="connect-button" id="connectButton" disabled>
                🔗 게임에 연결
            </button>
        </div>
        
        <!-- QR 스캐너 -->
        <div class="qr-scanner-section" id="qrScannerSection">
            <div class="section-title">📷 QR 코드 스캔</div>
            <button class="qr-button" id="qrButton">
                📷 QR 코드 스캔하기
            </button>
            <div id="qr-reader" style="display: none; margin-top: 1rem;"></div>
        </div>
        
        <!-- 게임 정보 -->
        <div class="game-info" id="gameInfo">
            <div class="section-title">🎮 연결된 게임</div>
            <div class="game-type-badge" id="gameTypeBadge">SOLO</div>
            <div class="game-details">
                <div class="detail-item">
                    <div class="detail-label">센서 ID</div>
                    <div class="detail-value" id="sensorId">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">연결된 센서</div>
                    <div class="detail-value" id="connectedSensors">0/1</div>
                </div>
            </div>
            <button class="btn btn-primary" id="startSensorBtn" style="width: 100%; margin-top: 1rem;" disabled>
                📱 센서 시작하기
            </button>
        </div>
        
        <!-- 센서 상태 -->
        <div class="sensor-status" id="sensorStatus">
            <div class="section-title">📊 실시간 센서 데이터</div>
            <div class="sensor-grid">
                <div class="sensor-item">
                    <div class="sensor-label">기울기 X</div>
                    <div class="sensor-value" id="tiltX">0.0</div>
                </div>
                <div class="sensor-item">
                    <div class="sensor-label">기울기 Y</div>
                    <div class="sensor-value" id="tiltY">0.0</div>
                </div>
                <div class="sensor-item">
                    <div class="sensor-label">회전 Z</div>
                    <div class="sensor-value" id="rotationZ">0.0</div>
                </div>
                <div class="sensor-item">
                    <div class="sensor-label">가속도 X</div>
                    <div class="sensor-value" id="accelX">0.0</div>
                </div>
                <div class="sensor-item">
                    <div class="sensor-label">가속도 Y</div>
                    <div class="sensor-value" id="accelY">0.0</div>
                </div>
                <div class="sensor-item">
                    <div class="sensor-label">가속도 Z</div>
                    <div class="sensor-value" id="accelZ">0.0</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 활동 표시 -->
    <div class="activity-indicator" id="activityIndicator">
        <div class="activity-text">센서 활동</div>
    </div>
    
    <!-- Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- QR Code Scanner (optional) -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <!-- SessionSDK -->
    <script src="/js/SessionSDK.js"></script>
    
    <!-- Sensor Controller Script -->
    <script>
        class SensorController {
            constructor() {
                // SDK 초기화
                this.sdk = new SessionSDK({
                    gameId: 'sensor-controller',
                    gameType: 'client',
                    debug: true
                });
                
                // 센서 수집기
                this.sensorCollector = new SensorCollector({
                    throttle: 33, // 33ms 간격 (30fps) - 성능 최적화
                    sensitivity: 1
                });
                
                // 상태 관리
                this.state = {
                    connected: false,
                    sessionConnected: false,
                    sensorActive: false,
                    currentSession: null,
                    gameId: null,
                    playerId: null
                };
                
                // Signal Flags v2 게임 상태
                this.signalFlagsState = {
                    isPlaying: false,
                    waitingForDefault: false,
                    currentRound: 0,
                    currentCommand: null,
                    currentGender: null,
                    isInDefaultState: false,
                    hasResponded: false,
                    sensorThresholds: {
                        defaultState: { beta: 30, gamma: 30 }, // ±30도로 완화
                        actions: {
                            up: { beta: 40 },      // beta > 40
                            down: { beta: -40 },   // beta < -40
                            left: { gamma: -40 },  // gamma < -40
                            right: { gamma: 40 }   // gamma > 40
                        }
                    }
                };
                
                // DOM 요소
                this.elements = {
                    statusIndicator: document.getElementById('statusIndicator'),
                    statusText: document.getElementById('statusText'),
                    message: document.getElementById('message'),
                    sessionInput: document.getElementById('sessionInput'),
                    connectButton: document.getElementById('connectButton'),
                    qrButton: document.getElementById('qrButton'),
                    gameInfo: document.getElementById('gameInfo'),
                    gameTypeBadge: document.getElementById('gameTypeBadge'),
                    sensorId: document.getElementById('sensorId'),
                    connectedSensors: document.getElementById('connectedSensors'),
                    sensorStatus: document.getElementById('sensorStatus'),
                    activityIndicator: document.getElementById('activityIndicator'),
                    sessionInputSection: document.getElementById('sessionInputSection'),
                    qrScannerSection: document.getElementById('qrScannerSection'),
                    startSensorBtn: document.getElementById('startSensorBtn'),
                    // 센서 데이터 표시 요소들
                    tiltX: document.getElementById('tiltX'),
                    tiltY: document.getElementById('tiltY'),
                    rotationZ: document.getElementById('rotationZ'),
                    accelX: document.getElementById('accelX'),
                    accelY: document.getElementById('accelY'),
                    accelZ: document.getElementById('accelZ')
                };
                
                this.initializeApp();
            }
            
            async initializeApp() {
                console.log('📱 센서 컨트롤러 v6.0 초기화');
                
                this.setupEventListeners();
                this.setupSDKEvents();
                
                // URL 파라미터에서 세션 코드 확인
                const urlParams = new URLSearchParams(window.location.search);
                const sessionCode = urlParams.get('session');
                
                if (sessionCode) {
                    this.elements.sessionInput.value = sessionCode;
                    this.showMessage('URL에서 세션 코드를 가져왔습니다.', 'success');
                }
                
                // 센서 지원 확인
                this.checkSensorSupport();
            }
            
            setupEventListeners() {
                // 세션 입력
                this.elements.sessionInput.addEventListener('input', (e) => {
                    const value = e.target.value.replace(/[^0-9]/g, '').slice(0, 4);
                    e.target.value = value;
                    
                    this.elements.connectButton.disabled = value.length !== 4 || !this.state.connected;
                });
                
                // 연결 버튼
                this.elements.connectButton.addEventListener('click', () => {
                    this.connectToSession();
                });
                
                // QR 스캔 버튼
                this.elements.qrButton.addEventListener('click', () => {
                    this.scanQRCode();
                });
                
                // 센서 시작 버튼
                this.elements.startSensorBtn.addEventListener('click', () => {
                    this.startSensorCollection();
                });
                
                // 엔터키 처리
                this.elements.sessionInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !this.elements.connectButton.disabled) {
                        this.connectToSession();
                    }
                });
            }
            
            setupSDKEvents() {
                // SDK 연결 이벤트
                this.sdk.on('connected', () => {
                    this.state.connected = true;
                    this.updateConnectionStatus('서버 연결됨', true);
                    this.elements.connectButton.disabled = this.elements.sessionInput.value.length !== 4;
                });
                
                this.sdk.on('disconnected', () => {
                    this.state.connected = false;
                    this.state.sessionConnected = false;
                    this.updateConnectionStatus('서버 연결 끊김', false);
                    this.elements.connectButton.disabled = true;
                    this.hideGameInfo();
                });
                
                this.sdk.on('connection-error', (data) => {
                    this.showMessage(`연결 오류: ${data.error}`, 'error');
                });
                
                // 센서 연결 성공
                this.sdk.on('sensor-connection-success', (data) => {
                    console.log('🔍 센서 연결 성공 데이터:', data);
                    this.state.sessionConnected = true;
                    this.state.currentSession = data;
                    
                    // 게임 ID 확인 - 세션 데이터에서 추출
                    this.state.gameId = data.gameId || data.sessionId?.split('_')[0] || 'unknown';
                    this.state.playerId = data.sensorId?.replace('sensor', '');
                    
                    console.log('🎮 게임 ID 감지:', this.state.gameId);
                    console.log('👤 플레이어 ID:', this.state.playerId);
                    console.log('📋 세션 정보 전체:', {
                        sessionId: data.sessionId,
                        sessionCode: data.sessionCode,
                        gameType: data.gameType,
                        sensorId: data.sensorId
                    });
                    
                    this.updateConnectionStatus(`게임에 연결됨 (${data.sensorId})`, true);
                    this.showGameInfo(data);
                    
                    // 센서 시작 버튼 활성화
                    this.elements.startSensorBtn.disabled = false;
                    
                    this.showMessage('게임에 연결되었습니다! 센서 시작 버튼을 눌러주세요.', 'success');
                });
                
                // 게임 시작
                this.sdk.on('game-started', (data) => {
                    this.showMessage('게임이 시작되었습니다!', 'success');
                    this.elements.gameTypeBadge.textContent = `${data.gameType.toUpperCase()} - 플레이 중`;
                });
                
                // 호스트 연결 해제
                this.sdk.on('host-disconnected', () => {
                    this.showMessage('게임 호스트가 연결을 해제했습니다.', 'warning');
                    this.resetConnection();
                });
                
                // 센서 오류
                this.sdk.on('sensor-error', (data) => {
                    this.showMessage(`센서 오류: ${data.error}`, 'error');
                });
                
                // Signal Flags v2 게임 이벤트들
                this.setupSignalFlagsEvents();
            }
            
            async connectToSession() {
                const sessionCode = this.elements.sessionInput.value.trim();
                
                if (!sessionCode || sessionCode.length !== 4) {
                    this.showMessage('올바른 4자리 세션 코드를 입력하세요.', 'error');
                    return;
                }
                
                try {
                    this.elements.connectButton.disabled = true;
                    this.elements.connectButton.textContent = '연결 중...';
                    
                    await this.sdk.connectSensor(sessionCode, {
                        userAgent: navigator.userAgent,
                        screenSize: `${screen.width}x${screen.height}`,
                        timestamp: Date.now()
                    });
                    
                } catch (error) {
                    this.showMessage(`연결 실패: ${error.message}`, 'error');
                    this.elements.connectButton.disabled = false;
                    this.elements.connectButton.textContent = '🔗 게임에 연결';
                }
            }
            
            async scanQRCode() {
                try {
                    this.showMessage('QR 코드 스캐너 준비 중...', 'warning');
                    
                    // QR 스캐너 컨테이너 표시
                    const qrReaderDiv = document.getElementById('qr-reader');
                    qrReaderDiv.style.display = 'block';
                    
                    // QR 스캐너 초기화
                    const qrCodeScanner = new Html5QrcodeScanner("qr-reader", {
                        fps: 10,
                        qrbox: { width: 250, height: 250 }
                    });
                    
                    // 성공 콜백
                    const onScanSuccess = (decodedText) => {
                        try {
                            console.log('QR 코드 스캔 성공:', decodedText);
                            
                            // URL에서 세션 코드 추출
                            const url = new URL(decodedText);
                            const sessionCode = url.searchParams.get('session');
                            
                            if (sessionCode && sessionCode.length === 4) {
                                this.elements.sessionInput.value = sessionCode;
                                this.showMessage('QR 코드에서 세션 코드를 가져왔습니다.', 'success');
                                qrCodeScanner.clear();
                                qrReaderDiv.style.display = 'none';
                            } else {
                                this.showMessage('올바른 QR 코드가 아닙니다.', 'error');
                            }
                        } catch (err) {
                            console.error('QR 코드 파싱 오류:', err);
                            this.showMessage('QR 코드를 해석할 수 없습니다.', 'error');
                        }
                    };
                    
                    // 오류 콜백
                    const onScanError = (error) => {
                        // 스캔 오류는 일반적이므로 로그만 남기고 UI에는 표시하지 않음
                        console.log(`QR 스캔 진행 중: ${error}`);
                    };
                    
                    // QR 스캐너 렌더링
                    qrCodeScanner.render(onScanSuccess, onScanError);
                    
                    this.showMessage('QR 코드를 카메라에 비춰주세요.', 'success');
                    
                } catch (error) {
                    console.error('QR 스캔 실패:', error);
                    this.showMessage('카메라에 접근할 수 없습니다. 권한을 확인해주세요.', 'error');
                    
                    // QR 스캐너 숨기기
                    const qrReaderDiv = document.getElementById('qr-reader');
                    if (qrReaderDiv) {
                        qrReaderDiv.style.display = 'none';
                    }
                }
            }
            
            async startSensorCollection() {
                try {
                    console.log('🔍 센서 수집 시작 시도...');
                    await this.sensorCollector.start();
                    this.state.sensorActive = true;
                    
                    // 센서 데이터 핸들러
                    this.sensorCollector.onData((data) => {
                        this.updateSensorDisplay(data);
                        this.sendSensorData(data);
                        this.showActivity();
                        
                        // Signal Flags v2 게임 로직 처리
                        if (this.state.gameId === 'signal-flags-v2') {
                            this.handleSignalFlagsSensorData(data);
                        }
                    });
                    
                    this.elements.sensorStatus.classList.add('visible');
                    this.elements.startSensorBtn.textContent = '✅ 센서 활성화됨';
                    this.elements.startSensorBtn.disabled = true;
                    this.showMessage('센서 수집이 시작되었습니다.', 'success');
                    console.log('✅ 센서 수집 시작 완료');
                    
                } catch (error) {
                    console.error('❌ 센서 시작 실패:', error);
                    this.showMessage(`센서 시작 실패: ${error.message}`, 'error');
                }
            }
            
            sendSensorData(data) {
                if (this.state.sessionConnected) {
                    // 센서 데이터 전송 로깅 (Signal Flags v2인 경우만 상세 로깅)
                    if (this.state.gameId === 'signal-flags-v2') {
                        console.log('📤 Signal Flags v2 센서 데이터 전송:', {
                            gameId: this.state.gameId,
                            playerId: this.state.playerId,
                            rawData: data,
                            orientation: data.orientation,
                            beta: data.orientation?.beta?.toFixed(1),
                            gamma: data.orientation?.gamma?.toFixed(1),
                            alpha: data.orientation?.alpha?.toFixed(1),
                            acceleration: data.acceleration,
                            sessionConnected: this.state.sessionConnected,
                            timestamp: new Date().toLocaleTimeString()
                        });
                    }
                    this.sdk.sendSensorData(data);
                } else {
                    console.log('⚠️ 세션 연결되지 않음 - 센서 데이터 전송 불가');
                }
            }
            
            updateSensorDisplay(data) {
                // 기울기 (orientation)
                const beta = data.orientation.beta || 0;
                const gamma = data.orientation.gamma || 0;
                
                this.elements.tiltX.textContent = beta.toFixed(1);
                this.elements.tiltY.textContent = gamma.toFixed(1);
                this.elements.rotationZ.textContent = (data.orientation.alpha || 0).toFixed(1);
                
                // 가속도 (acceleration)
                this.elements.accelX.textContent = (data.acceleration.x || 0).toFixed(2);
                this.elements.accelY.textContent = (data.acceleration.y || 0).toFixed(2);
                this.elements.accelZ.textContent = (data.acceleration.z || 0).toFixed(2);
                
                // Signal Flags v2 디버깅: 디폴트 상태 표시
                if (this.state.gameId === 'signal-flags-v2') {
                    const isInDefault = this.checkDefaultState(beta, gamma);
                    const statusEl = document.getElementById('signalFlagsStatus');
                    
                    if (!statusEl) {
                        // 임시 상태 표시 요소 생성
                        const statusDiv = document.createElement('div');
                        statusDiv.id = 'signalFlagsStatus';
                        statusDiv.style.cssText = 'position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 5px; font-size: 12px; z-index: 1000;';
                        document.body.appendChild(statusDiv);
                    }
                    
                    const statusDiv = document.getElementById('signalFlagsStatus');
                    statusDiv.innerHTML = `
                        <div>Beta: ${beta.toFixed(1)}° (±30°)</div>
                        <div>Gamma: ${gamma.toFixed(1)}° (±30°)</div>
                        <div style="color: ${isInDefault ? '#16a34a' : '#ef4444'}">
                            ${isInDefault ? '✅ 디폴트 상태' : '❌ 벗어남'}
                        </div>
                    `;
                }
            }
            
            showActivity() {
                this.elements.activityIndicator.classList.add('active');
                
                clearTimeout(this.activityTimeout);
                this.activityTimeout = setTimeout(() => {
                    this.elements.activityIndicator.classList.remove('active');
                }, 200);
            }
            
            updateConnectionStatus(text, connected) {
                this.elements.statusText.textContent = text;
                this.elements.statusIndicator.classList.toggle('connected', connected);
            }
            
            showGameInfo(data) {
                this.elements.gameTypeBadge.textContent = data.gameType?.toUpperCase() || 'UNKNOWN';
                this.elements.sensorId.textContent = data.sensorId || '-';
                this.elements.connectedSensors.textContent = `${data.connectedSensors || 0}/${data.maxSensors || 1}`;
                
                this.elements.gameInfo.classList.add('visible');
                this.elements.sessionInputSection.style.display = 'none';
                this.elements.qrScannerSection.style.display = 'none';
            }
            
            hideGameInfo() {
                this.elements.gameInfo.classList.remove('visible');
                this.elements.sensorStatus.classList.remove('visible');
                this.elements.sessionInputSection.style.display = 'block';
                this.elements.qrScannerSection.style.display = 'block';
            }
            
            resetConnection() {
                this.state.sessionConnected = false;
                this.state.sensorActive = false;
                this.state.currentSession = null;
                
                if (this.sensorCollector.isActive) {
                    this.sensorCollector.stop();
                }
                
                this.updateConnectionStatus('서버 연결됨', this.state.connected);
                this.hideGameInfo();
                
                this.elements.connectButton.disabled = this.elements.sessionInput.value.length !== 4 || !this.state.connected;
                this.elements.connectButton.textContent = '🔗 게임에 연결';
                this.elements.sessionInput.value = '';
            }
            
            checkSensorSupport() {
                if (!this.sensorCollector.checkSensorSupport()) {
                    this.showMessage('이 기기는 센서를 지원하지 않습니다.', 'error');
                    this.elements.connectButton.disabled = true;
                    this.elements.qrButton.disabled = true;
                }
            }
            
            showMessage(text, type = 'success') {
                this.elements.message.textContent = text;
                this.elements.message.className = `message ${type} visible`;
                
                setTimeout(() => {
                    this.elements.message.classList.remove('visible');
                }, 5000);
            }
            
            // === Signal Flags v2 게임 전용 메서드들 ===
            
            setupSignalFlagsEvents() {
                // Signal Flags v2 게임별 소켓 이벤트 리스너
                if (this.sdk.socket) {
                    this.sdk.socket.on('signal-flags-v2-wait-default', (data) => {
                        console.log('📍 디폴트 상태 대기 시작');
                        this.signalFlagsState.waitingForDefault = true;
                        this.signalFlagsState.isInDefaultState = false;
                        this.showMessage('📱 핸드폰을 앞으로 쭉 뻗어 수평으로 유지하세요 (±30도)', 'warning');
                    });
                    
                    this.sdk.socket.on('signal-flags-v2-round-start', (data) => {
                        console.log('🚩 라운드 시작:', data);
                        this.signalFlagsState.isPlaying = true;
                        this.signalFlagsState.waitingForDefault = false;
                        this.signalFlagsState.currentRound = data.round;
                        this.signalFlagsState.currentCommand = data.command;
                        this.signalFlagsState.currentGender = data.gender;
                        this.signalFlagsState.hasResponded = false;
                        
                        const genderText = data.gender === 'male' ? '👨 남성' : '👩 여성';
                        const actionText = this.getActionInstruction(data.command, data.gender);
                        this.showMessage(`${genderText}: "${data.command.toUpperCase()}" → ${actionText}`, 'success');
                    });
                    
                    this.sdk.socket.on('signal-flags-v2-round-end', (data) => {
                        console.log('📊 라운드 종료:', data);
                        this.signalFlagsState.isPlaying = false;
                        this.signalFlagsState.hasResponded = false;
                        this.signalFlagsState.isInDefaultState = false; // 디폴트 상태 리셋
                        
                        // 내 응답 결과 표시
                        if (data.responses && this.state.playerId) {
                            const myResponse = data.responses[this.state.playerId];
                            if (myResponse) {
                                const resultText = myResponse.isCorrect ? 
                                    `✅ 정답! (+${myResponse.scoreChange}점)` : 
                                    `❌ 오답 (${myResponse.scoreChange}점)`;
                                this.showMessage(resultText, myResponse.isCorrect ? 'success' : 'error');
                            }
                        }
                        
                        console.log('🔄 라운드 종료 - 디폴트 상태 복귀 대기 중...');
                    });
                    
                    this.sdk.socket.on('signal-flags-v2-game-end', (data) => {
                        console.log('🏆 게임 종료:', data);
                        this.signalFlagsState.isPlaying = false;
                        this.signalFlagsState.waitingForDefault = false;
                        
                        const winnerText = data.winner === 0 ? '🤝 무승부!' :
                                         data.winner === parseInt(this.state.playerId) ? '🏆 승리!' : '😢 패배';
                        this.showMessage(`게임 종료! ${winnerText}`, 'success');
                    });
                }
            }
            
            handleSignalFlagsSensorData(data) {
                // Signal Flags v2 게임이 아니면 무시
                if (this.state.gameId !== 'signal-flags-v2') return;
                
                const beta = data.orientation.beta || 0;   // 앞뒤 기울기
                const gamma = data.orientation.gamma || 0; // 좌우 기울기
                
                // 디버깅: 센서 값 실시간 로깅
                if (this.signalFlagsState.waitingForDefault || this.signalFlagsState.isPlaying) {
                    console.log(`📊 센서값: beta=${beta.toFixed(1)}°, gamma=${gamma.toFixed(1)}° | 디폴트범위: ±${this.signalFlagsState.sensorThresholds.defaultState.beta}°`);
                }
                
                // 디폴트 상태 감지
                const isInDefaultState = this.checkDefaultState(beta, gamma);
                
                if (this.signalFlagsState.waitingForDefault) {
                    // 디폴트 상태 대기 중
                    if (isInDefaultState && !this.signalFlagsState.isInDefaultState) {
                        this.signalFlagsState.isInDefaultState = true;
                        console.log('✅ 디폴트 상태 감지됨:', { beta, gamma });
                        
                        // 서버에 디폴트 상태 준비 완료 알림
                        this.sdk.socket.emit('signal-flags-v2-default-ready', {
                            sessionCode: this.state.currentSession.sessionCode || this.state.currentSession.sessionId?.split('_')[1],
                            playerId: this.state.playerId
                        });
                        
                        this.showMessage('✅ 디폴트 상태 감지! 명령을 기다리는 중...', 'success');
                    } else if (!isInDefaultState) {
                        if (this.signalFlagsState.isInDefaultState) {
                            console.log('⚠️ 디폴트 상태 벗어남:', { beta, gamma });
                            
                            // 서버에 디폴트 상태 벗어남 알림
                            this.sdk.socket.emit('signal-flags-v2-default-lost', {
                                sessionCode: this.state.currentSession.sessionCode || this.state.currentSession.sessionId?.split('_')[1],
                                playerId: this.state.playerId
                            });
                        }
                        this.signalFlagsState.isInDefaultState = false;
                    }
                } else if (this.signalFlagsState.isPlaying && !this.signalFlagsState.hasResponded) {
                    // 게임 중 - 동작 감지
                    const detectedAction = this.detectAction(beta, gamma);
                    
                    if (detectedAction) {
                        this.signalFlagsState.hasResponded = true;
                        console.log(`🎯 동작 감지: ${detectedAction}`, { beta, gamma });
                        
                        // 서버에 응답 전송
                        this.sdk.socket.emit('signal-flags-v2-player-response', {
                            sessionCode: this.state.currentSession.sessionCode || this.state.currentSession.sessionId?.split('_')[1],
                            playerId: this.state.playerId,
                            direction: detectedAction,
                            timestamp: Date.now()
                        });
                        
                        this.showMessage(`🎯 응답: ${detectedAction.toUpperCase()}`, 'warning');
                    }
                } else if (!this.signalFlagsState.isPlaying && !this.signalFlagsState.waitingForDefault) {
                    // 라운드 종료 후 디폴트 상태로 돌아갔는지 확인
                    if (isInDefaultState && !this.signalFlagsState.isInDefaultState) {
                        this.signalFlagsState.isInDefaultState = true;
                        console.log('🔄 라운드 종료 후 디폴트 상태 복귀:', { beta, gamma });
                        
                        // 서버에 디폴트 상태 복귀 알림
                        this.sdk.socket.emit('signal-flags-v2-default-ready', {
                            sessionCode: this.state.currentSession.sessionCode || this.state.currentSession.sessionId?.split('_')[1],
                            playerId: this.state.playerId
                        });
                        
                        this.showMessage('🔄 디폴트 상태 복귀 완료', 'success');
                    } else if (!isInDefaultState) {
                        if (this.signalFlagsState.isInDefaultState) {
                            console.log('⚠️ 라운드 종료 후 디폴트 상태 벗어남:', { beta, gamma });
                            
                            // 서버에 디폴트 상태 벗어남 알림
                            this.sdk.socket.emit('signal-flags-v2-default-lost', {
                                sessionCode: this.state.currentSession.sessionCode || this.state.currentSession.sessionId?.split('_')[1],
                                playerId: this.state.playerId
                            });
                        }
                        this.signalFlagsState.isInDefaultState = false;
                    }
                }
            }
            
            checkDefaultState(beta, gamma) {
                const thresholds = this.signalFlagsState.sensorThresholds.defaultState;
                return Math.abs(beta) <= thresholds.beta && Math.abs(gamma) <= thresholds.gamma;
            }
            
            detectAction(beta, gamma) {
                const actions = this.signalFlagsState.sensorThresholds.actions;
                
                // 우선순위: 위/아래 > 좌/우
                if (beta > actions.up.beta) return 'up';
                if (beta < actions.down.beta) return 'down';
                if (gamma < actions.left.gamma) return 'left';
                if (gamma > actions.right.gamma) return 'right';
                
                return null;
            }
            
            getActionInstruction(command, gender) {
                // 여성의 명령은 그대로, 남성의 명령은 반대로
                if (gender === 'female') {
                    return `핸드폰을 ${this.getDirectionText(command)}로`;
                } else {
                    const oppositeMap = {
                        'up': 'down',
                        'down': 'up', 
                        'left': 'right',
                        'right': 'left'
                    };
                    const oppositeDirection = oppositeMap[command];
                    return `핸드폰을 ${this.getDirectionText(oppositeDirection)}로 (반대로!)`;
                }
            }
            
            getDirectionText(direction) {
                const directionMap = {
                    'up': '위',
                    'down': '아래',
                    'left': '왼쪽',
                    'right': '오른쪽'
                };
                return directionMap[direction] || direction;
            }
        }
        
        // 앱 시작
        document.addEventListener('DOMContentLoaded', () => {
            new SensorController();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚩 Signal Flags v2 - Sensor Game Hub</title>
    <style>
        :root {
            --primary: #dc2626;
            --secondary: #7c2d12;
            --success: #16a34a;
            --warning: #f59e0b;
            --error: #ef4444;
            --background: #0f0f0f;
            --surface: #1a1a1a;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent: #f59e0b;
            --male-color: #3b82f6;
            --female-color: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--background), #020617);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 상단 헤더 */
        .game-header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
        }

        .session-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 0.6rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .session-info {
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 1rem;
            padding: 1rem;
            display: none;
            max-width: 300px;
        }

        .session-info.visible {
            display: block;
        }

        .session-code {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 0.8rem;
            letter-spacing: 0.2em;
        }

        .qr-container {
            text-align: center;
            margin-bottom: 1rem;
        }

        .qr-container canvas,
        .qr-container img {
            max-width: 150px;
            height: auto;
            border-radius: 0.5rem;
        }

        .connection-status {
            display: flex;
            justify-content: space-between;
            gap: 0.8rem;
        }

        .sensor-status {
            padding: 0.4rem 0.8rem;
            border-radius: 0.4rem;
            font-weight: 600;
            font-size: 0.8rem;
            text-align: center;
            flex: 1;
        }

        .sensor-status.connected {
            background: rgba(22, 163, 74, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .sensor-status.disconnected {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* 게임 메인 영역 */
        .game-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            z-index: 10;
        }

        /* 게임 상태 표시 */
        .game-status {
            text-align: center;
            margin-bottom: 2rem;
        }

        .round-info {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .game-message {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        /* 명령 표시 영역 */
        .command-display {
            background: var(--surface);
            border: 3px solid var(--primary);
            border-radius: 2rem;
            padding: 3rem 2rem;
            margin: 2rem 0;
            text-align: center;
            min-width: 400px;
            position: relative;
            display: none;
        }

        .command-display.visible {
            display: block;
        }

        .command-display.male {
            border-color: var(--male-color);
            background: rgba(59, 130, 246, 0.1);
        }

        .command-display.female {
            border-color: var(--female-color);
            background: rgba(236, 72, 153, 0.1);
        }

        .commander-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .command-text {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .command-text.male {
            color: var(--male-color);
        }

        .command-text.female {
            color: var(--female-color);
        }

        /* 타이머 */
        .timer-container {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--error), var(--warning), var(--success));
            width: 100%;
            transition: width 0.1s linear;
        }

        /* 점수판 */
        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 2rem;
        }

        .player-score {
            text-align: center;
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 2px solid var(--primary);
            min-width: 120px;
        }

        .player-score.player1 {
            border-color: var(--male-color);
        }

        .player-score.player2 {
            border-color: var(--female-color);
        }

        .player-name {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .score-value {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
        }

        .player-score.player1 .score-value {
            color: var(--male-color);
        }

        .player-score.player2 .score-value {
            color: var(--female-color);
        }

        /* 게임 컨트롤 */
        .game-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .control-btn.primary {
            background: var(--primary);
            color: white;
        }

        .control-btn.home {
            background: var(--warning);
            color: white;
        }

        .control-btn.primary:hover,
        .control-btn.home:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 게임 결과 */
        .game-result {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-result.visible {
            display: flex;
        }

        .result-content {
            background: var(--surface);
            border: 2px solid var(--primary);
            border-radius: 2rem;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
        }

        .result-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .result-title.winner {
            color: var(--success);
        }

        .result-title.loser {
            color: var(--error);
        }

        .result-title.draw {
            color: var(--warning);
        }

        .final-scores {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
        }

        .final-score {
            text-align: center;
        }

        .final-score-label {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .final-score-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .command-display {
                min-width: 300px;
                padding: 2rem 1rem;
            }
            
            .commander-icon {
                font-size: 4rem;
            }
            
            .command-text {
                font-size: 2rem;
            }
            
            .scoreboard {
                gap: 1rem;
            }
            
            .game-controls {
                flex-direction: column;
                align-items: center;
            }
        }

        /* 숨김 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 상단 헤더 -->
        <div class="game-header">
            <div class="session-title">🚩 Signal Flags v2</div>
            <div class="session-info" id="sessionInfo">
                <div class="session-code" id="sessionCode">----</div>
                <div class="qr-container" id="qrContainer">
                    <!-- QR 코드가 여기에 생성됩니다 -->
                </div>
                <div class="connection-status">
                    <div class="sensor-status disconnected" id="sensor1Status">
                        플레이어 1
                    </div>
                    <div class="sensor-status disconnected" id="sensor2Status">
                        플레이어 2
                    </div>
                </div>
            </div>
        </div>

        <!-- 게임 메인 영역 -->
        <div class="game-main">
            <!-- 게임 상태 -->
            <div class="game-status">
                <div class="round-info" id="roundInfo">게임 준비 중...</div>
                <div class="game-message" id="gameMessage">두 명의 플레이어가 연결되면 게임이 시작됩니다</div>
            </div>

            <!-- 명령 표시 영역 -->
            <div class="command-display" id="commandDisplay">
                <div class="commander-icon" id="commanderIcon">🚩</div>
                <div class="command-text" id="commandText">준비하세요</div>
                <div class="timer-container">
                    <div class="timer-fill" id="timerFill"></div>
                </div>
            </div>

            <!-- 점수판 -->
            <div class="scoreboard">
                <div class="player-score player1">
                    <div class="player-name">플레이어 1</div>
                    <div class="score-value" id="score1">0</div>
                </div>
                <div class="player-score player2">
                    <div class="player-name">플레이어 2</div>
                    <div class="score-value" id="score2">0</div>
                </div>
            </div>

            <!-- 게임 컨트롤 -->
            <div class="game-controls">
                <button class="control-btn primary" id="startBtn" disabled>🚩 게임 시작</button>
                <button class="control-btn primary" id="resetBtn" disabled>🔄 다시 시작</button>
                <a href="/" class="control-btn home">🏠 허브로</a>
            </div>
        </div>

        <!-- 게임 결과 -->
        <div class="game-result" id="gameResult">
            <div class="result-content">
                <div class="result-title" id="resultTitle">게임 종료</div>
                <div class="final-scores">
                    <div class="final-score">
                        <div class="final-score-label">플레이어 1</div>
                        <div class="final-score-value" id="finalScore1">0</div>
                    </div>
                    <div class="final-score">
                        <div class="final-score-label">플레이어 2</div>
                        <div class="final-score-value" id="finalScore2">0</div>
                    </div>
                </div>
                <div class="game-controls">
                    <button class="control-btn primary" onclick="location.reload()">🔄 새 게임</button>
                    <a href="/" class="control-btn home">🏠 허브로</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/SessionSDK.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <script>
        class SignalFlagsV2Game {
            constructor() {
                console.log('🚩 Signal Flags v2 게임 초기화 시작');
                
                // 게임 상태
                this.gameState = 'waiting'; // waiting, ready, playing, finished
                this.connectedSensors = new Map();
                this.session = null;
                this.defaultReadyPlayers = new Set(); // 디폴트 상태 준비 완료된 플레이어들
                
                // Signal Flags v2 전용 상태 (중요!)
                this.signalFlagsState = {
                    waitingForDefault: false,
                    isPlaying: false,
                    currentRound: 0,
                    currentCommand: null,
                    currentGender: null
                };
                
                // 게임 설정
                this.config = {
                    totalRounds: 10,
                    responseTime: 3000, // 3초
                    defaultStateTime: 2000, // 2초간 디폴트 상태 유지
                    commands: ['up', 'down', 'left', 'right'],
                    genders: ['male', 'female'],
                    sensorThresholds: {
                        defaultState: { beta: 15, gamma: 15 }, // 실제 측정: beta=0.7°, gamma=0.6°이므로 ±15도로 설정
                        actions: {
                            up: { beta: 30 },      // 위쪽 동작 감지 (실제론 더 큰 값이지만 빠른 반응을 위해)
                            down: { beta: -30 },   // 아래쪽 동작 감지 (실제 측정: -78.7°)
                            left: { gamma: 30 },   // 왼쪽 동작 감지 (실제 측정: 33.9°)  
                            right: { gamma: 45 }   // 오른쪽 동작 감지 (실제 측정: 73.8°)
                        }
                    }
                };
                
                // 게임 데이터
                this.gameData = {
                    currentRound: 0,
                    maxRounds: this.config.totalRounds,
                    currentCommand: null,
                    currentGender: null,
                    roundStartTime: 0,
                    playerScores: { player1: 0, player2: 0 },
                    playerResponses: new Map(),
                    responseCount: 0
                };
                
                // 타이머
                this.gameTimer = null;
                this.responseTimer = null;
                
                // DOM 요소들
                this.elements = {
                    sessionInfo: document.getElementById('sessionInfo'),
                    sessionCode: document.getElementById('sessionCode'),
                    qrContainer: document.getElementById('qrContainer'),
                    sensor1Status: document.getElementById('sensor1Status'),
                    sensor2Status: document.getElementById('sensor2Status'),
                    roundInfo: document.getElementById('roundInfo'),
                    gameMessage: document.getElementById('gameMessage'),
                    commandDisplay: document.getElementById('commandDisplay'),
                    commanderIcon: document.getElementById('commanderIcon'),
                    commandText: document.getElementById('commandText'),
                    timerFill: document.getElementById('timerFill'),
                    score1: document.getElementById('score1'),
                    score2: document.getElementById('score2'),
                    startBtn: document.getElementById('startBtn'),
                    resetBtn: document.getElementById('resetBtn'),
                    gameResult: document.getElementById('gameResult'),
                    resultTitle: document.getElementById('resultTitle'),
                    finalScore1: document.getElementById('finalScore1'),
                    finalScore2: document.getElementById('finalScore2')
                };
                
                // SDK 초기화
                this.initializeSDK();
                this.setupEvents();
                
                console.log('✅ Signal Flags v2 게임 초기화 완료');
            }
            
            initializeSDK() {
                this.sdk = new SessionSDK({
                    gameId: 'signal-flags-v2',
                    gameType: 'dual'
                });
            }
            
            setupEvents() {
                // SDK 이벤트 (AI_ASSISTANT_PROMPTS.md 지침 준수)
                this.sdk.on('connected', () => {
                    console.log('✅ 서버 연결됨');
                    this.createSession();
                });
                
                this.sdk.on('session-created', (event) => {
                    const session = event.detail || event; // 필수 패턴!
                    console.log('🚩 세션 생성됨:', session);
                    this.displaySessionInfo(session);
                });
                
                this.sdk.on('sensor-connected', (event) => {
                    const data = event.detail || event; // 필수 패턴!
                    console.log('🎮 센서 연결됨:', data);
                    this.handleSensorConnection(data);
                });
                
                this.sdk.on('sensor-disconnected', (event) => {
                    const data = event.detail || event; // 필수 패턴!
                    console.log('❌ 센서 연결 해제됨:', data);
                    this.handleSensorDisconnection(data);
                });
                
                this.sdk.on('sensor-data', (event) => {
                    const data = event.detail || event; // 필수 패턴!
                    this.handleSensorData(data);
                });
                
                // Signal Flags v2 전용 이벤트
                this.setupSignalFlagsEvents();
                
                // UI 이벤트
                this.elements.startBtn.addEventListener('click', () => {
                    this.startGame();
                });
                
                this.elements.resetBtn.addEventListener('click', () => {
                    this.resetGame();
                });
            }
            
            setupSignalFlagsEvents() {
                // 소켓 연결 확인
                if (!this.sdk.socket) {
                    setTimeout(() => this.setupSignalFlagsEvents(), 100);
                    return;
                }
                
                // 디폴트 상태 준비 완료 이벤트
                this.sdk.socket.on('signal-flags-v2-default-ready', (data) => {
                    console.log('📍 플레이어 디폴트 상태 준비:', data);
                    this.handleDefaultReady(data);
                });
                
                // 디폴트 상태 벗어남 이벤트
                this.sdk.socket.on('signal-flags-v2-default-lost', (data) => {
                    console.log('⚠️ 플레이어 디폴트 상태 벗어남:', data);
                    this.handleDefaultLost(data);
                });
                
                // 플레이어 응답 이벤트
                this.sdk.socket.on('signal-flags-v2-player-response', (data) => {
                    console.log('📡 플레이어 응답 수신:', data);
                    this.handlePlayerResponse(data);
                });
            }
            
            createSession() {
                this.sdk.createSession({
                    maxPlayers: 2,
                    gameMode: 'signal-flags-v2'
                });
            }
            
            displaySessionInfo(session) {
                this.session = session;
                this.elements.sessionCode.textContent = session.sessionCode;
                this.elements.sessionInfo.classList.add('visible');
                
                // QR 코드 생성 (AI_ASSISTANT_PROMPTS.md 지침 준수)
                this.generateQRCode(session.sessionCode);
            }
            
            generateQRCode(sessionCode) {
                const qrUrl = `${window.location.origin}/sensor.html?session=${sessionCode}`;
                
                // QRCode 라이브러리 사용 (폴백 처리)
                if (typeof QRCode !== 'undefined') {
                    try {
                        // 캔버스 생성
                        const canvas = document.createElement('canvas');
                        this.elements.qrContainer.innerHTML = '';
                        this.elements.qrContainer.appendChild(canvas);
                        
                        QRCode.toCanvas(canvas, qrUrl, {
                            width: 150,
                            height: 150,
                            colorDark: '#dc2626',
                            colorLight: '#ffffff'
                        }, (error) => {
                            if (error) {
                                console.error('QR 생성 오류:', error);
                                this.showQRCodeFallback(qrUrl);
                            }
                        });
                    } catch (error) {
                        console.error('QR 라이브러리 오류:', error);
                        this.showQRCodeFallback(qrUrl);
                    }
                } else {
                    this.showQRCodeFallback(qrUrl);
                }
            }
            
            showQRCodeFallback(qrUrl) {
                // 폴백: 외부 QR 생성 API 사용
                const img = document.createElement('img');
                img.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&color=dc2626&bgcolor=ffffff&data=${encodeURIComponent(qrUrl)}`;
                img.alt = 'QR Code';
                this.elements.qrContainer.innerHTML = '';
                this.elements.qrContainer.appendChild(img);
            }
            
            handleSensorConnection(data) {
                const sensorId = data.sensorId;
                this.connectedSensors.set(sensorId, {
                    id: sensorId,
                    connected: true,
                    lastActivity: Date.now()
                });
                
                this.updateSensorStatus();
                
                if (this.connectedSensors.size === 2) {
                    this.setGameState('ready');
                }
            }
            
            handleSensorDisconnection(data) {
                const sensorId = data.sensorId;
                this.connectedSensors.delete(sensorId);
                
                this.updateSensorStatus();
                
                // 게임 중이었다면 즉시 종료
                if (this.gameState === 'playing') {
                    this.endGameByDisconnection();
                } else {
                    this.setGameState('waiting');
                }
            }
            
            updateSensorStatus() {
                const sensor1Connected = this.connectedSensors.has('sensor1');
                const sensor2Connected = this.connectedSensors.has('sensor2');
                
                this.elements.sensor1Status.className = `sensor-status ${sensor1Connected ? 'connected' : 'disconnected'}`;
                this.elements.sensor1Status.textContent = sensor1Connected ? '플레이어 1 ✅' : '플레이어 1';
                
                this.elements.sensor2Status.className = `sensor-status ${sensor2Connected ? 'connected' : 'disconnected'}`;
                this.elements.sensor2Status.textContent = sensor2Connected ? '플레이어 2 ✅' : '플레이어 2';
            }
            
            setGameState(state) {
                this.gameState = state;
                
                switch (state) {
                    case 'waiting':
                        this.elements.gameMessage.textContent = '두 명의 플레이어가 연결되면 게임이 시작됩니다';
                        this.elements.startBtn.disabled = true;
                        this.elements.resetBtn.disabled = true;
                        break;
                        
                    case 'ready':
                        this.elements.gameMessage.textContent = '🎮 준비 완료! 게임을 시작하세요';
                        this.elements.startBtn.disabled = false;
                        this.elements.resetBtn.disabled = false;
                        break;
                        
                    case 'playing':
                        // 세션 정보 숨김 (AI_ASSISTANT_PROMPTS.md 지침)
                        this.elements.sessionInfo.classList.remove('visible');
                        this.elements.startBtn.disabled = true;
                        break;
                        
                    case 'finished':
                        // 세션 정보 다시 표시 (AI_ASSISTANT_PROMPTS.md 지침)
                        this.elements.sessionInfo.classList.add('visible');
                        this.elements.startBtn.disabled = false;
                        this.elements.resetBtn.disabled = false;
                        break;
                }
            }
            
            startGame() {
                if (this.connectedSensors.size < 2) {
                    alert('두 명의 플레이어가 모두 연결되어야 합니다!');
                    return;
                }
                
                console.log('🚩 게임 시작!');
                this.setGameState('playing');
                
                // 게임 데이터 초기화
                this.gameData = {
                    currentRound: 0,
                    maxRounds: this.config.totalRounds,
                    currentCommand: null,
                    currentGender: null,
                    roundStartTime: 0,
                    playerScores: { player1: 0, player2: 0 },
                    playerResponses: new Map(),
                    responseCount: 0
                };
                
                this.updateScoreboard();
                this.showCountdown();
            }
            
            showCountdown() {
                let count = 3;
                const countdownInterval = setInterval(() => {
                    if (count > 0) {
                        this.elements.gameMessage.textContent = `게임 시작까지 ${count}초`;
                        count--;
                    } else {
                        this.elements.gameMessage.textContent = '디폴트 상태로 대기하세요';
                        clearInterval(countdownInterval);
                        this.waitForDefaultState();
                    }
                }, 1000);
            }
            
            waitForDefaultState() {
                this.elements.gameMessage.textContent = '📱 모든 플레이어가 핸드폰을 앞으로 쭉 뻗어 수평으로 유지하세요 (0/2)';
                this.defaultReadyPlayers.clear();
                
                // Signal Flags 상태 업데이트
                this.signalFlagsState.waitingForDefault = true;
                console.log('📍 디폴트 상태 대기 시작 - waitingForDefault = true');
                
                // 센서 클라이언트에게 디폴트 상태 대기 시작 알림
                if (this.sdk.socket) {
                    this.sdk.socket.emit('signal-flags-v2-wait-default', {
                        sessionCode: this.session.sessionCode
                    });
                    console.log('✅ 디폴트 상태 대기 알림 전송 완료:', this.session.sessionCode);
                } else {
                    console.error('❌ 소켓 연결이 없어 디폴트 상태 알림 전송 실패');
                }
            }
            
            handleDefaultReady(data) {
                console.log('🔍 디폴트 준비 이벤트 상세:', {
                    playerId: data.playerId,
                    playerIdType: typeof data.playerId,
                    currentPlayers: Array.from(this.defaultReadyPlayers),
                    waitingForDefault: this.signalFlagsState.waitingForDefault,
                    gameState: this.gameState
                });
                
                // 디폴트 상태 대기 중이 아니면 무시
                if (!this.signalFlagsState.waitingForDefault) {
                    console.warn('⚠️ 디폴트 상태 대기 중이 아닌데 디폴트 준비 이벤트 수신');
                    return;
                }
                
                // 디폴트 상태 준비 완료 플레이어 추가
                this.defaultReadyPlayers.add(data.playerId);
                console.log(`📍 Player${data.playerId} 디폴트 상태 준비 완료 (${this.defaultReadyPlayers.size}/2)`);
                console.log('🔍 현재 대기 플레이어 목록:', Array.from(this.defaultReadyPlayers));
                
                // 메시지 업데이트
                this.elements.gameMessage.textContent = `📱 모든 플레이어가 디폴트 상태를 유지하세요 (${this.defaultReadyPlayers.size}/2)`;
                
                // 정확히 두 플레이어 모두 디폴트 상태에 있으면 라운드 시작
                if (this.defaultReadyPlayers.size === 2) {
                    console.log('🚀 모든 플레이어 디폴트 상태 준비 완료 - 라운드 시작');
                    console.log('🔍 라운드 시작 전 최종 플레이어 목록:', Array.from(this.defaultReadyPlayers));
                    this.elements.gameMessage.textContent = '🚀 모든 플레이어 준비 완료! 곧 다음 라운드가 시작됩니다...';
                    
                    // 디폴트 상태 대기 해제
                    this.signalFlagsState.waitingForDefault = false;
                    this.defaultReadyPlayers.clear();
                    
                    setTimeout(() => {
                        this.startNextRound();
                    }, 500);
                } else {
                    console.log(`⏳ 디폴트 상태 대기 중... (${this.defaultReadyPlayers.size}/2)`);
                }
            }
            
            startNextRound() {
                this.gameData.currentRound++;
                
                if (this.gameData.currentRound > this.gameData.maxRounds) {
                    this.endGame();
                    return;
                }
                
                // 랜덤 명령과 성별 선택
                this.gameData.currentCommand = this.config.commands[Math.floor(Math.random() * this.config.commands.length)];
                this.gameData.currentGender = this.config.genders[Math.floor(Math.random() * this.config.genders.length)];
                this.gameData.roundStartTime = Date.now();
                this.gameData.playerResponses.clear();
                this.gameData.responseCount = 0;
                
                this.updateRoundDisplay();
                this.playVoiceCommand();
                this.startResponseTimer();
                
                // 센서 클라이언트에 라운드 시작 알림
                if (this.sdk.socket) {
                    this.sdk.socket.emit('signal-flags-v2-round-start', {
                        sessionCode: this.session.sessionCode,
                        round: this.gameData.currentRound,
                        command: this.gameData.currentCommand,
                        gender: this.gameData.currentGender
                    });
                }
                
                console.log(`🚩 라운드 ${this.gameData.currentRound}: ${this.gameData.currentGender} says "${this.gameData.currentCommand}"`);
            }
            
            updateRoundDisplay() {
                this.elements.roundInfo.textContent = `라운드 ${this.gameData.currentRound} / ${this.gameData.maxRounds}`;
                
                // 성별 아이콘 업데이트
                this.elements.commanderIcon.textContent = this.gameData.currentGender === 'male' ? '👨' : '👩';
                
                // 명령 텍스트 업데이트
                this.elements.commandText.textContent = this.gameData.currentCommand.toUpperCase();
                this.elements.commandText.className = `command-text ${this.gameData.currentGender}`;
                this.elements.commandDisplay.className = `command-display visible ${this.gameData.currentGender}`;
            }
            
            playVoiceCommand() {
                // 실제 음성 파일 재생
                const audioPath = `/games/signal-flags-v2/assets/${this.gameData.currentGender}/_${this.gameData.currentCommand.toLowerCase()}.m4a`;
                
                console.log(`🎤 음성 파일 재생 시도: ${audioPath}`);
                
                const audio = new Audio(audioPath);
                audio.volume = 1.0;
                
                // 로딩 타임아웃 설정 (3초)
                const loadTimeout = setTimeout(() => {
                    console.warn(`⏰ 음성 파일 로딩 타임아웃: ${audioPath}`);
                    this.playTTSFallback();
                }, 3000);
                
                audio.addEventListener('loadeddata', () => {
                    clearTimeout(loadTimeout);
                    console.log(`✅ 음성 파일 로딩 완료: ${audioPath}`);
                });
                
                audio.addEventListener('error', (error) => {
                    clearTimeout(loadTimeout);
                    console.warn(`❌ 음성 파일 로딩 실패: ${audioPath}`, error);
                    this.playTTSFallback();
                });
                
                audio.play().then(() => {
                    clearTimeout(loadTimeout);
                    console.log(`🎵 음성 파일 재생 성공: ${audioPath}`);
                }).catch(error => {
                    clearTimeout(loadTimeout);
                    console.warn(`🔇 음성 파일 재생 실패: ${audioPath}`, error);
                    this.playTTSFallback();
                });
            }
            
            playTTSFallback() {
                console.log(`🎤 TTS 폴백 시작: ${this.gameData.currentGender}_${this.gameData.currentCommand}`);
                
                if ('speechSynthesis' in window) {
                    // 기존 TTS 중지
                    speechSynthesis.cancel();
                    
                    // 명령어를 한국어로 변환
                    const koreanCommands = {
                        'up': '위',
                        'down': '아래', 
                        'left': '왼쪽',
                        'right': '오른쪽'
                    };
                    
                    const commandText = koreanCommands[this.gameData.currentCommand] || this.gameData.currentCommand;
                    
                    const utterance = new SpeechSynthesisUtterance(commandText);
                    
                    // 성별에 따른 음성 설정
                    utterance.pitch = this.gameData.currentGender === 'male' ? 0.6 : 1.4;
                    utterance.rate = 1.0;
                    utterance.volume = 1.0;
                    utterance.lang = 'ko-KR';
                    
                    // 음성 선택 (가능한 경우)
                    const voices = speechSynthesis.getVoices();
                    const koreanVoices = voices.filter(voice => voice.lang.includes('ko'));
                    
                    if (koreanVoices.length > 0) {
                        // 성별에 맞는 음성 선택 시도
                        const genderVoice = koreanVoices.find(voice => 
                            this.gameData.currentGender === 'female' ? 
                            voice.name.includes('Female') || voice.name.includes('여성') :
                            voice.name.includes('Male') || voice.name.includes('남성')
                        );
                        utterance.voice = genderVoice || koreanVoices[0];
                    }
                    
                    utterance.onstart = () => {
                        console.log(`🎵 TTS 재생 시작: ${commandText} (${this.gameData.currentGender})`);
                    };
                    
                    utterance.onend = () => {
                        console.log(`✅ TTS 재생 완료: ${commandText}`);
                    };
                    
                    utterance.onerror = (error) => {
                        console.error(`❌ TTS 재생 오류:`, error);
                    };
                    
                    speechSynthesis.speak(utterance);
                } else {
                    console.warn('⚠️ TTS를 지원하지 않는 브라우저입니다.');
                }
            }
            
            startResponseTimer() {
                let timeLeft = this.config.responseTime;
                this.elements.timerFill.style.width = '100%';
                
                this.responseTimer = setInterval(() => {
                    timeLeft -= 100;
                    const percentage = (timeLeft / this.config.responseTime) * 100;
                    this.elements.timerFill.style.width = `${Math.max(0, percentage)}%`;
                    
                    if (timeLeft <= 0) {
                        this.endRound();
                    }
                }, 100);
            }
            
            handleSensorData(data) {
                // 센서 데이터 구조 상세 분석
                console.log('🔍 센서 데이터 원본 분석:', {
                    wholeData: data,
                    sensorData: data.sensorData,
                    dataProperty: data.data,
                    dataOrientation: data.data?.orientation,
                    sensorDataOrientation: data.sensorData?.orientation,
                    directAccess: {
                        beta: data.data?.orientation?.beta,
                        gamma: data.data?.orientation?.gamma,
                        alpha: data.data?.orientation?.alpha
                    }
                });
                
                // 올바른 센서 데이터 추출 (data.data.orientation이 실제 경로)
                let orientationData = null;
                
                if (data.data?.orientation) {
                    orientationData = data.data.orientation;
                } else if (data.sensorData?.orientation) {
                    orientationData = data.sensorData.orientation;
                } else if (data.orientation) {
                    orientationData = data.orientation;
                } else {
                    console.warn('⚠️ 센서 orientation 데이터를 찾을 수 없음');
                    return;
                }
                
                // 센서 데이터 수신 로깅
                console.log('📡 게임에서 센서 데이터 수신:', {
                    sensorId: data.sensorId,
                    gameState: this.gameState,
                    waitingForDefault: this.signalFlagsState.waitingForDefault,
                    beta: orientationData.beta?.toFixed(1),
                    gamma: orientationData.gamma?.toFixed(1),
                    alpha: orientationData.alpha?.toFixed(1),
                    orientationData: orientationData,
                    timestamp: new Date().toLocaleTimeString()
                });
                
                // 디폴트 상태 대기 중에는 게임에서 센서 데이터를 처리하지 않음
                // 센서 클라이언트에서만 처리하고 서버를 통해 알림을 받음
                if (this.signalFlagsState.waitingForDefault) {
                    console.log('📍 디폴트 상태 대기 중 - 센서 클라이언트의 알림 대기');
                    return;
                }
                
                // 게임 중이 아니면 센서 데이터 무시
                if (this.gameState !== 'playing') {
                    console.log('⚠️ 게임 상태가 playing이 아니므로 센서 데이터 무시');
                    return;
                }
                
                // 실제 센서 기반 게임 로직은 센서 클라이언트에서 처리됨
                // 여기서는 UI 업데이트만 수행
            }
            
            handlePlayerResponse(data) {
                // 응답 데이터 검증
                if (!data.playerId || !data.direction || !data.sessionCode) {
                    console.warn('⚠️ 잘못된 응답 데이터:', data);
                    return;
                }
                
                // 이미 응답한 플레이어는 무시
                if (this.gameData.playerResponses.has(data.playerId)) {
                    console.log('⚠️ 이미 응답한 플레이어:', data.playerId);
                    return;
                }
                
                // 응답 저장 및 점수 계산
                const isCorrect = this.evaluateResponse(data.direction);
                const scoreChange = isCorrect ? 1 : -1;
                
                this.gameData.playerResponses.set(data.playerId, {
                    direction: data.direction,
                    isCorrect: isCorrect,
                    scoreChange: scoreChange,
                    timestamp: Date.now()
                });
                
                // 점수 업데이트 (최소 0점)
                const currentScore = this.gameData.playerScores[`player${data.playerId}`];
                this.gameData.playerScores[`player${data.playerId}`] = Math.max(0, currentScore + scoreChange);
                
                this.gameData.responseCount++;
                this.updateScoreboard();
                
                console.log(`📊 응답 처리: Player${data.playerId} - ${data.direction} (${isCorrect ? '정답' : '오답'}) 점수변화: ${scoreChange}`);
                
                // 두 플레이어 모두 응답했으면 디폴트 상태 대기로 전환
                if (this.gameData.responseCount >= 2) {
                    console.log('📍 모든 플레이어 응답 완료 - 디폴트 상태 대기 모드로 전환');
                    this.waitForDefaultStateAfterResponse();
                }
            }
            
            handleDefaultLost(data) {
                console.log('🔍 디폴트 벗어남 이벤트 상세:', {
                    playerId: data.playerId,
                    playerIdType: typeof data.playerId,
                    currentPlayers: Array.from(this.defaultReadyPlayers),
                    waitingForDefault: this.signalFlagsState.waitingForDefault,
                    gameState: this.gameState
                });
                
                // 디폴트 상태 대기 중이 아니면 무시
                if (!this.signalFlagsState.waitingForDefault) {
                    console.warn('⚠️ 디폴트 상태 대기 중이 아닌데 디폴트 벗어남 이벤트 수신');
                    return;
                }
                
                // 디폴트 상태에서 벗어난 플레이어 제거
                const wasInSet = this.defaultReadyPlayers.has(data.playerId);
                this.defaultReadyPlayers.delete(data.playerId);
                console.log(`⚠️ Player${data.playerId} 디폴트 상태 벗어남 - 대기 플레이어에서 제거 (${this.defaultReadyPlayers.size}/2)`);
                console.log('🔍 벗어남 후 플레이어 목록:', Array.from(this.defaultReadyPlayers));
                console.log('🔍 플레이어가 목록에 있었는지:', wasInSet);
                
                // 메시지 업데이트
                this.elements.gameMessage.textContent = `📱 모든 플레이어가 디폴트 상태를 유지해야 합니다 (${this.defaultReadyPlayers.size}/2)`;
            }
            
            waitForDefaultStateAfterResponse() {
                // 응답 타이머 정리
                if (this.responseTimer) {
                    clearInterval(this.responseTimer);
                    this.responseTimer = null;
                }
                
                // 명령 표시 숨김
                this.elements.commandDisplay.classList.remove('visible');
                
                // 디폴트 상태 복귀 대기 시작
                this.elements.gameMessage.textContent = '📱 모든 플레이어가 디폴트 상태로 복귀하세요 (0/2)';
                this.defaultReadyPlayers.clear();
                
                // Signal Flags 상태 업데이트
                this.signalFlagsState.waitingForDefault = true;
                this.signalFlagsState.isPlaying = false; // 응답 완료 후이므로 플레이 상태 해제
                
                console.log('📍 응답 완료 후 디폴트 상태 대기 시작');
                
                // 라운드 결과를 센서 클라이언트에 전송
                if (this.sdk.socket) {
                    this.sdk.socket.emit('signal-flags-v2-round-end', {
                        sessionCode: this.session.sessionCode,
                        round: this.gameData.currentRound,
                        responses: Object.fromEntries(this.gameData.playerResponses),
                        scores: this.gameData.playerScores
                    });
                    
                    // 센서 클라이언트에게 디폴트 상태 대기 시작 알림
                    this.sdk.socket.emit('signal-flags-v2-wait-default', {
                        sessionCode: this.session.sessionCode
                    });
                    
                    console.log('✅ 라운드 결과 및 디폴트 상태 대기 알림 전송 완료');
                }
            }
            
            evaluateResponse(direction) {
                const command = this.gameData.currentCommand;
                const gender = this.gameData.currentGender;
                
                // 여성의 명령은 그대로, 남성의 명령은 반대로
                let expectedDirection;
                if (gender === 'female') {
                    expectedDirection = command;
                } else {
                    // 남성의 명령은 반대로 수행
                    const oppositeMap = {
                        'up': 'down',
                        'down': 'up',
                        'left': 'right',
                        'right': 'left'
                    };
                    expectedDirection = oppositeMap[command];
                }
                
                return direction === expectedDirection;
            }
            
            endRound() {
                if (this.responseTimer) {
                    clearInterval(this.responseTimer);
                    this.responseTimer = null;
                }
                
                // 시간 초과한 플레이어들 처리
                const playerIds = ['1', '2'];
                playerIds.forEach(playerId => {
                    if (!this.gameData.playerResponses.has(playerId)) {
                        // 시간 초과 - 점수 -1 (최소 0점)
                        const currentScore = this.gameData.playerScores[`player${playerId}`];
                        this.gameData.playerScores[`player${playerId}`] = Math.max(0, currentScore - 1);
                        
                        this.gameData.playerResponses.set(playerId, {
                            direction: 'timeout',
                            isCorrect: false,
                            scoreChange: -1,
                            timestamp: Date.now()
                        });
                    }
                });
                
                this.updateScoreboard();
                
                // 라운드 결과를 센서 클라이언트에 전송
                if (this.sdk.socket) {
                    this.sdk.socket.emit('signal-flags-v2-round-end', {
                        sessionCode: this.session.sessionCode,
                        round: this.gameData.currentRound,
                        responses: Object.fromEntries(this.gameData.playerResponses),
                        scores: this.gameData.playerScores
                    });
                }
                
                // 명령 표시 숨김
                this.elements.commandDisplay.classList.remove('visible');
                
                // 다음 라운드 또는 게임 종료
                setTimeout(() => {
                    if (this.gameData.currentRound >= this.gameData.maxRounds) {
                        this.endGame();
                    } else {
                        this.waitForDefaultState();
                    }
                }, 1500);
            }
            
            updateScoreboard() {
                this.elements.score1.textContent = this.gameData.playerScores.player1;
                this.elements.score2.textContent = this.gameData.playerScores.player2;
            }
            
            endGame() {
                this.setGameState('finished');
                
                if (this.responseTimer) {
                    clearInterval(this.responseTimer);
                    this.responseTimer = null;
                }
                
                // 최종 점수 확인
                const score1 = this.gameData.playerScores.player1;
                const score2 = this.gameData.playerScores.player2;
                
                // 결과 표시
                this.elements.finalScore1.textContent = score1;
                this.elements.finalScore2.textContent = score2;
                
                let resultText, resultClass;
                if (score1 > score2) {
                    resultText = '🏆 플레이어 1 승리!';
                    resultClass = 'winner';
                } else if (score2 > score1) {
                    resultText = '🏆 플레이어 2 승리!';
                    resultClass = 'winner';
                } else {
                    resultText = '🤝 무승부!';
                    resultClass = 'draw';
                }
                
                this.elements.resultTitle.textContent = resultText;
                this.elements.resultTitle.className = `result-title ${resultClass}`;
                this.elements.gameResult.classList.add('visible');
                
                // 센서 클라이언트에 게임 종료 알림
                if (this.sdk.socket) {
                    this.sdk.socket.emit('signal-flags-v2-game-end', {
                        sessionCode: this.session.sessionCode,
                        finalScores: this.gameData.playerScores,
                        winner: score1 > score2 ? 1 : (score2 > score1 ? 2 : 0)
                    });
                }
                
                console.log('🏆 게임 종료:', resultText);
            }
            
            endGameByDisconnection() {
                this.setGameState('finished');
                
                if (this.responseTimer) {
                    clearInterval(this.responseTimer);
                    this.responseTimer = null;
                }
                
                this.elements.gameMessage.textContent = '❌ 플레이어 연결이 해제되어 게임이 종료되었습니다';
                this.elements.commandDisplay.classList.remove('visible');
                
                alert('플레이어 연결이 해제되어 게임이 종료되었습니다.');
            }
            
            resetGame() {
                // 게임 상태 초기화
                this.setGameState('ready');
                this.defaultReadyPlayers.clear();
                
                // 게임 데이터 초기화
                this.gameData = {
                    currentRound: 0,
                    maxRounds: this.config.totalRounds,
                    currentCommand: null,
                    currentGender: null,
                    roundStartTime: 0,
                    playerScores: { player1: 0, player2: 0 },
                    playerResponses: new Map(),
                    responseCount: 0
                };
                
                // 타이머 정리
                if (this.responseTimer) {
                    clearInterval(this.responseTimer);
                    this.responseTimer = null;
                }
                
                // UI 초기화
                this.elements.roundInfo.textContent = '게임 준비 중...';
                this.elements.gameMessage.textContent = '🎮 준비 완료! 게임을 시작하세요';
                this.elements.commandDisplay.classList.remove('visible');
                this.elements.gameResult.classList.remove('visible');
                this.elements.timerFill.style.width = '100%';
                this.updateScoreboard();
                
                console.log('🔄 게임 리셋');
            }
        }
        
        // 게임 시작
        document.addEventListener('DOMContentLoaded', () => {
            new SignalFlagsV2Game();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚩 Signal Flags v2 - Sensor Game Hub</title>
    <style>
        :root {
            --primary: #dc2626;
            --secondary: #7c2d12;
            --success: #16a34a;
            --warning: #f59e0b;
            --error: #ef4444;
            --background: #0f0f0f;
            --surface: #1a1a1a;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent: #f59e0b;
            --male-color: #3b82f6;
            --female-color: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--background), #020617);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 상단 헤더 */
        .game-header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
        }

        .session-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 0.6rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .session-info {
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 1rem;
            padding: 1rem;
            display: none;
            max-width: 300px;
        }

        .session-info.visible {
            display: block;
        }

        .session-code {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 0.8rem;
            letter-spacing: 0.2em;
        }

        .qr-container {
            text-align: center;
            margin-bottom: 1rem;
        }

        .qr-container canvas,
        .qr-container img {
            max-width: 150px;
            height: auto;
            border-radius: 0.5rem;
        }

        .connection-status {
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .sensor-status {
            padding: 0.3rem 0.6rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            flex: 1;
        }

        .sensor-status.connected {
            background: var(--success);
            color: white;
        }

        .sensor-status.disconnected {
            background: var(--error);
            color: white;
        }

        /* 게임 메인 영역 */
        .game-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6rem 2rem 2rem;
        }

        /* 게임 상태 */
        .game-status {
            text-align: center;
            margin-bottom: 2rem;
        }

        .round-info {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .status-message {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        /* 플레이어 점수 */
        .players-container {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .player {
            background: var(--surface);
            border: 2px solid var(--primary);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            min-width: 150px;
        }

        .player.active {
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.5);
        }

        .player-name {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        .player-score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
        }

        /* 명령 표시 영역 */
        .command-display {
            background: var(--surface);
            border: 3px solid var(--primary);
            border-radius: 2rem;
            padding: 3rem 2rem;
            margin: 2rem 0;
            text-align: center;
            min-width: 400px;
            position: relative;
            display: none;
        }

        .command-display.visible {
            display: block;
        }

        .command-display.male {
            border-color: var(--male-color);
            background: rgba(59, 130, 246, 0.1);
        }

        .command-display.female {
            border-color: var(--female-color);
            background: rgba(236, 72, 153, 0.1);
        }

        .commander-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .command-text {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .command-text.male {
            color: var(--male-color);
        }

        .command-text.female {
            color: var(--female-color);
        }

        .action-hint {
            font-size: 1.2rem;
            margin-top: 1rem;
            color: var(--text-secondary);
        }

        /* 타이머 */
        .timer-container {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--error), var(--warning), var(--success));
            width: 100%;
            transition: width 0.1s linear;
        }

        /* 게임 컨트롤 */
        .game-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .control-btn.primary {
            background: var(--primary);
            color: white;
        }

        .control-btn.secondary {
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .control-btn.home {
            background: var(--warning);
            color: white;
        }

        .control-btn.primary:hover,
        .control-btn.secondary:hover,
        .control-btn.home:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 결과 화면 */
        .result-screen {
            text-align: center;
            display: none;
        }

        .result-screen.visible {
            display: block;
        }

        .result-title {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .result-title.win {
            color: var(--success);
        }

        .result-title.lose {
            color: var(--error);
        }

        .result-title.draw {
            color: var(--warning);
        }

        .final-scores {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--text-secondary);
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .game-main {
                padding: 4rem 1rem 1rem;
            }
            
            .players-container {
                flex-direction: column;
                gap: 1rem;
            }
            
            .command-display {
                min-width: 300px;
                padding: 2rem 1rem;
            }
            
            .commander-icon {
                font-size: 4rem;
            }
            
            .command-text {
                font-size: 2rem;
            }
        }

        /* 숨김 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 상단 헤더 -->
        <div class="game-header">
            <div class="session-title">🚩 Signal Flags v2</div>
            <div class="session-info visible" id="sessionInfo">
                <div class="session-code" id="sessionCode">----</div>
                <div class="qr-container" id="qrContainer">
                    <!-- QR 코드가 여기에 생성됩니다 -->
                </div>
                <div class="connection-status">
                    <div class="sensor-status disconnected" id="sensorStatus1">센서 1</div>
                    <div class="sensor-status disconnected" id="sensorStatus2">센서 2</div>
                </div>
            </div>
        </div>

        <!-- 게임 메인 영역 -->
        <div class="game-main">
            <!-- 게임 상태 -->
            <div class="game-status">
                <div class="round-info" id="roundInfo">게임 준비 중...</div>
                <div class="status-message" id="statusMessage">센서 클라이언트 연결을 기다리는 중...</div>
            </div>

            <!-- 플레이어 점수 -->
            <div class="players-container" id="playersContainer">
                <div class="player" id="player1">
                    <div class="player-name">플레이어 1</div>
                    <div class="player-score" id="player1Score">0</div>
                </div>
                <div class="player" id="player2">
                    <div class="player-name">플레이어 2</div>
                    <div class="player-score" id="player2Score">0</div>
                </div>
            </div>

            <!-- 명령 표시 영역 -->
            <div class="command-display" id="commandDisplay">
                <div class="commander-icon" id="commanderIcon">🚩</div>
                <div class="command-text" id="commandText">준비하세요</div>
                <div class="action-hint" id="actionHint">지시에 따라 움직이세요</div>
                <div class="timer-container">
                    <div class="timer-fill" id="timerFill"></div>
                </div>
            </div>

            <!-- 게임 컨트롤 -->
            <div class="game-controls">
                <button class="control-btn primary" id="startBtn" disabled>🚩 게임 시작</button>
                <button class="control-btn secondary" id="resetBtn">🔄 다시 시작</button>
                <a href="/" class="control-btn home">🏠 허브로</a>
            </div>

            <!-- 결과 화면 -->
            <div class="result-screen" id="resultScreen">
                <div class="result-title" id="resultTitle">🏆 게임 종료!</div>
                <div class="final-scores" id="finalScores">최종 점수를 확인하세요</div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/SessionSDK.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <script>
        class SignalFlagsV2Refactored {
            constructor() {
                console.log('🚩 Signal Flags v2 (리팩토링 버전) 초기화 시작');
                
                // 게임 설정
                this.config = {
                    maxRounds: 10,
                    responseTime: 3000,
                    defaultStateTime: 2000,
                    sensorThresholds: {
                        defaultState: { beta: 10, gamma: 10 }, // 더 엄격한 디폴트 상태 (±10도)
                        actions: {
                            up: { beta: 25 },    // 액션 임계값도 조정
                            down: { beta: -25 },
                            left: { gamma: -25 },
                            right: { gamma: 25 }
                        }
                    }
                };
                
                // 게임 상태
                this.gameState = 'waiting'; // waiting, ready, playing, finished
                this.currentRound = 0;
                this.scores = { player1: 0, player2: 0 };
                this.connectedSensors = new Set();
                this.sensorsInDefaultState = new Set(); // 디폴트 상태인 센서들 추적
                
                // 라운드 데이터
                this.currentRoundData = {
                    command: null,
                    gender: null,
                    responses: new Map(),
                    correctResponses: new Map(),
                    startTime: 0
                };
                
                // 타이머
                this.responseTimer = null;
                this.defaultStateTimer = null;
                
                // DOM 요소
                this.elements = {
                    sessionInfo: document.getElementById('sessionInfo'),
                    sessionCode: document.getElementById('sessionCode'),
                    qrContainer: document.getElementById('qrContainer'),
                    sensorStatus1: document.getElementById('sensorStatus1'),
                    sensorStatus2: document.getElementById('sensorStatus2'),
                    roundInfo: document.getElementById('roundInfo'),
                    statusMessage: document.getElementById('statusMessage'),
                    playersContainer: document.getElementById('playersContainer'),
                    player1: document.getElementById('player1'),
                    player2: document.getElementById('player2'),
                    player1Score: document.getElementById('player1Score'),
                    player2Score: document.getElementById('player2Score'),
                    commandDisplay: document.getElementById('commandDisplay'),
                    commanderIcon: document.getElementById('commanderIcon'),
                    commandText: document.getElementById('commandText'),
                    actionHint: document.getElementById('actionHint'),
                    timerFill: document.getElementById('timerFill'),
                    startBtn: document.getElementById('startBtn'),
                    resetBtn: document.getElementById('resetBtn'),
                    resultScreen: document.getElementById('resultScreen'),
                    resultTitle: document.getElementById('resultTitle'),
                    finalScores: document.getElementById('finalScores')
                };
                
                // 초기화
                this.initializeGame();
            }
            
            initializeGame() {
                console.log('🎮 게임 초기화');
                
                // 이벤트 리스너 설정
                this.setupEventListeners();
                
                // 세션 코드 생성
                this.generateSessionCode();
                
                // SDK 초기화
                this.initializeSDK();
                
                console.log('✅ Signal Flags v2 리팩토링 버전 초기화 완료');
            }
            
            setupEventListeners() {
                // 게임 시작 버튼
                this.elements.startBtn.addEventListener('click', () => {
                    this.startGame();
                });
                
                // 리셋 버튼
                this.elements.resetBtn.addEventListener('click', () => {
                    this.resetGame();
                });
            }
            
            generateSessionCode() {
                // 4자리 랜덤 코드 생성
                const code = Math.floor(1000 + Math.random() * 9000).toString();
                this.elements.sessionCode.textContent = code;
                console.log('📱 세션 코드 생성:', code);
                
                // QR 코드 생성
                this.generateQRCode(code);
            }
            
            generateQRCode(sessionCode) {
                const qrUrl = `${window.location.origin}/sensor.html?session=${sessionCode}`;
                console.log('📱 QR 코드 생성 중:', qrUrl);
                
                if (typeof QRCode !== 'undefined') {
                    try {
                        const canvas = document.createElement('canvas');
                        this.elements.qrContainer.innerHTML = '';
                        this.elements.qrContainer.appendChild(canvas);
                        
                        QRCode.toCanvas(canvas, qrUrl, {
                            width: 150,
                            height: 150,
                            colorDark: '#dc2626',
                            colorLight: '#ffffff',
                            margin: 2
                        }, (error) => {
                            if (error) {
                                console.error('QR 생성 오류:', error);
                                this.showQRCodeFallback(qrUrl);
                            } else {
                                console.log('✅ QR 코드 생성 완료');
                            }
                        });
                    } catch (error) {
                        console.error('QR 라이브러리 오류:', error);
                        this.showQRCodeFallback(qrUrl);
                    }
                } else {
                    console.warn('QRCode 라이브러리 로드되지 않음, 폴백 사용');
                    this.showQRCodeFallback(qrUrl);
                }
            }
            
            showQRCodeFallback(qrUrl) {
                console.log('📱 QR 코드 폴백 API 사용');
                const img = document.createElement('img');
                img.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&color=dc2626&bgcolor=ffffff&data=${encodeURIComponent(qrUrl)}`;
                img.alt = 'QR Code';
                img.style.maxWidth = '150px';
                img.style.height = 'auto';
                
                this.elements.qrContainer.innerHTML = '';
                this.elements.qrContainer.appendChild(img);
                
                img.onload = () => {
                    console.log('✅ QR 코드 폴백 로드 완료');
                };
                
                img.onerror = () => {
                    console.error('❌ QR 코드 폴백도 실패');
                    this.elements.qrContainer.innerHTML = '<p style="color: #ef4444; font-size: 0.9rem;">QR 코드 생성 실패</p>';
                };
            }
            
            initializeSDK() {
                try {
                    this.sdk = new SessionSDK({
                        gameId: 'signal-flags-v2',
                        gameType: 'dual'
                    });
                    
                    this.setupSDKEvents();
                    this.createGameSession();
                    
                } catch (error) {
                    console.error('SDK 초기화 실패:', error);
                    this.elements.statusMessage.textContent = 'SDK 초기화 실패 - 오프라인 모드';
                }
            }
            
            setupSDKEvents() {
                if (!this.sdk) return;
                
                // 서버 연결
                this.sdk.on('connected', () => {
                    console.log('✅ 서버 연결됨');
                    this.elements.statusMessage.textContent = '센서 클라이언트 연결을 기다리는 중...';
                });
                
                // 세션 생성
                this.sdk.on('session-created', (event) => {
                    const session = event.detail || event;
                    console.log('🎮 세션 생성됨:', session);
                    
                    if (session.sessionCode) {
                        this.elements.sessionCode.textContent = session.sessionCode;
                        this.generateQRCode(session.sessionCode);
                    }
                });
                
                // 센서 연결
                this.sdk.on('sensor-connected', (event) => {
                    const data = event.detail || event;
                    console.log('📱 센서 연결됨:', data);
                    
                    this.onSensorConnected(data);
                });
                
                // 센서 연결 해제
                this.sdk.on('sensor-disconnected', (event) => {
                    const data = event.detail || event;
                    console.log('📱 센서 연결 해제:', data);
                    
                    this.onSensorDisconnected(data);
                });
                
                // 센서 데이터
                this.sdk.on('sensor-data', (event) => {
                    const data = event.detail || event;
                    this.handleSensorData(data);
                });
                
                // 디폴트 상태 감지 - SessionSDK 기본 이벤트
                this.sdk.on('default-state-detected', (event) => {
                    const data = event.detail || event;
                    console.log('📍 디폴트 상태 감지됨:', data);
                    this.onDefaultStateDetected(data);
                });
                
                // Signal Flags v2 전용 디폴트 상태 준비 완료
                this.sdk.socket.on('signal-flags-v2-default-ready', (data) => {
                    console.log('🚩 Signal Flags v2 디폴트 상태 준비 완료:', data);
                    this.onDefaultStateDetected(data);
                });
                
                // 플레이어 응답 - SessionSDK 기본 이벤트
                this.sdk.on('player-response', (event) => {
                    const data = event.detail || event;
                    console.log('🎯 플레이어 응답:', data);
                    this.handlePlayerResponse(data);
                });
                
                // Signal Flags v2 전용 플레이어 응답
                this.sdk.socket.on('signal-flags-v2-player-response', (data) => {
                    console.log('🚩 Signal Flags v2 플레이어 응답:', data);
                    this.handlePlayerResponse({
                        sensorId: data.playerId || data.sensorId,
                        direction: data.direction,
                        responseTime: Date.now() - this.currentRoundData.startTime,
                        timestamp: data.timestamp
                    });
                });
            }
            
            createGameSession() {
                if (!this.sdk) return;
                
                const sessionCode = this.elements.sessionCode.textContent;
                
                this.sdk.on('connected', () => {
                    console.log('🎮 게임 세션 생성 요청');
                    this.sdk.createSession({
                        gameId: 'signal-flags-v2',
                        gameType: 'dual',
                        sessionCode: sessionCode
                    });
                });
            }
            
            onSensorConnected(data) {
                const sensorId = data.sensorId || data.sensor || 'sensor';
                this.connectedSensors.add(sensorId);
                
                // UI 업데이트
                if (sensorId.includes('1') || this.connectedSensors.size === 1) {
                    this.elements.sensorStatus1.textContent = '센서 1 ✓';
                    this.elements.sensorStatus1.classList.remove('disconnected');
                    this.elements.sensorStatus1.classList.add('connected');
                } else if (sensorId.includes('2') || this.connectedSensors.size === 2) {
                    this.elements.sensorStatus2.textContent = '센서 2 ✓';
                    this.elements.sensorStatus2.classList.remove('disconnected');
                    this.elements.sensorStatus2.classList.add('connected');
                }
                
                this.updateGameReadiness();
            }
            
            onSensorDisconnected(data) {
                const sensorId = data.sensorId || data.sensor || 'sensor';
                this.connectedSensors.delete(sensorId);
                
                // UI 업데이트
                if (sensorId.includes('1')) {
                    this.elements.sensorStatus1.textContent = '센서 1';
                    this.elements.sensorStatus1.classList.remove('connected');
                    this.elements.sensorStatus1.classList.add('disconnected');
                } else if (sensorId.includes('2')) {
                    this.elements.sensorStatus2.textContent = '센서 2';
                    this.elements.sensorStatus2.classList.remove('connected');
                    this.elements.sensorStatus2.classList.add('disconnected');
                }
                
                this.updateGameReadiness();
            }
            
            updateGameReadiness() {
                const requiredSensors = 2;
                const connectedCount = this.connectedSensors.size;
                
                if (connectedCount >= requiredSensors) {
                    this.elements.statusMessage.textContent = '모든 센서가 연결되었습니다! 게임을 시작하세요.';
                    this.elements.startBtn.disabled = false;
                    this.gameState = 'ready';
                } else {
                    this.elements.statusMessage.textContent = `센서 연결 중... (${connectedCount}/${requiredSensors})`;
                    this.elements.startBtn.disabled = true;
                    if (this.gameState === 'ready') {
                        this.gameState = 'waiting';
                    }
                }
            }
            
            startGame() {
                if (this.gameState !== 'ready') {
                    console.warn('게임 시작 불가 - 상태:', this.gameState);
                    return;
                }
                
                console.log('🚩 게임 시작!');
                this.gameState = 'playing';
                this.currentRound = 0;
                this.scores = { player1: 0, player2: 0 };
                
                // UI 업데이트
                this.elements.startBtn.disabled = true;
                this.elements.sessionInfo.classList.remove('visible');
                this.updateScoreDisplay();
                
                // 첫 라운드 시작
                this.startNextRound();
            }
            
            startNextRound() {
                this.currentRound++;
                
                if (this.currentRound > this.config.maxRounds) {
                    this.endGame();
                    return;
                }
                
                console.log(`🚩 라운드 ${this.currentRound} 시작`);
                
                // 라운드 데이터 초기화
                this.currentRoundData = {
                    command: this.getRandomCommand(),
                    gender: this.getRandomGender(),
                    responses: new Map(),
                    correctResponses: new Map(),
                    startTime: Date.now()
                };
                
                // 디폴트 상태 추적 초기화
                this.sensorsInDefaultState.clear();
                
                // 정답 계산
                this.calculateCorrectResponses();
                
                // UI 업데이트
                this.elements.roundInfo.textContent = `라운드 ${this.currentRound} / ${this.config.maxRounds}`;
                this.elements.statusMessage.textContent = '디폴트 상태를 유지하고 명령을 기다리세요';
                
                // 디폴트 상태 대기 시작
                this.waitForDefaultState();
            }
            
            getRandomCommand() {
                const commands = ['up', 'down', 'left', 'right'];
                return commands[Math.floor(Math.random() * commands.length)];
            }
            
            getRandomGender() {
                const genders = ['male', 'female'];
                return genders[Math.floor(Math.random() * genders.length)];
            }
            
            calculateCorrectResponses() {
                const { command, gender } = this.currentRoundData;
                
                if (gender === 'female') {
                    // 여성의 명령은 그대로
                    this.currentRoundData.correctResponses.set('sensor1', command);
                    this.currentRoundData.correctResponses.set('sensor2', command);
                } else {
                    // 남성의 명령은 반대로
                    const opposites = {
                        'up': 'down',
                        'down': 'up', 
                        'left': 'right',
                        'right': 'left'
                    };
                    const correctResponse = opposites[command];
                    this.currentRoundData.correctResponses.set('sensor1', correctResponse);
                    this.currentRoundData.correctResponses.set('sensor2', correctResponse);
                }
                
                console.log('🎯 정답 계산:', {
                    command: this.currentRoundData.command,
                    gender: this.currentRoundData.gender,
                    correctResponses: Object.fromEntries(this.currentRoundData.correctResponses)
                });
            }
            
            waitForDefaultState() {
                console.log('📍 디폴트 상태 대기 시작');
                
                // 센서 클라이언트에게 디폴트 상태 대기 요청 전송
                if (this.sdk && this.sdk.socket) {
                    this.sdk.socket.emit('signal-flags-v2-wait-default', {
                        sessionCode: this.elements.sessionCode.textContent,
                        roundNumber: this.currentRound,
                        command: this.currentRoundData.command,
                        gender: this.currentRoundData.gender
                    });
                }
                
                // 타임아웃 설정 (10초 후에도 디폴트 상태가 감지되지 않으면 강제 시작)
                this.defaultStateTimer = setTimeout(() => {
                    console.warn('⚠️ 디폴트 상태 타임아웃 - 강제 라운드 시작');
                    this.startRoundExecution();
                }, 10000);
            }
            
            onDefaultStateDetected(data) {
                // 게임이 진행 중이 아니면 무시 (디폴트 상태 대기 중에만 처리)
                if (this.gameState !== 'playing') {
                    console.log(`⚠️ 게임 상태 부적절 - 디폴트 상태 감지 무시 (현재: ${this.gameState})`);
                    return;
                }
                
                // 이미 라운드 실행 중이면 무시 (디폴트 상태 대기 중에만 처리)
                if (this.responseTimer) {
                    console.log('⚠️ 라운드 실행 중 - 디폴트 상태 감지 무시');
                    return;
                }
                
                console.log('📍 디폴트 상태 감지됨:', data);
                
                // 센서 ID 추출
                const sensorId = data.playerId || data.sensorId || `sensor${this.sensorsInDefaultState.size + 1}`;
                
                // 이미 디폴트 상태인 센서는 무시
                if (this.sensorsInDefaultState.has(sensorId)) {
                    console.log(`📍 ${sensorId} 이미 디폴트 상태 - 중복 감지 무시`);
                    return;
                }
                
                // 디폴트 상태 센서 추가
                this.sensorsInDefaultState.add(sensorId);
                console.log(`✅ ${sensorId} 디폴트 상태 준비 완료 (${this.sensorsInDefaultState.size}/${this.connectedSensors.size})`);
                
                // 상태 메시지 업데이트 - 실시간 알림
                this.elements.statusMessage.textContent = `✅ ${sensorId} 디폴트 상태 인식! (${this.sensorsInDefaultState.size}/${this.connectedSensors.size})`;
                
                // 모든 센서가 디폴트 상태가 되면 라운드 시작
                if (this.sensorsInDefaultState.size >= this.connectedSensors.size && this.connectedSensors.size >= 2) {
                    console.log('🚀 모든 센서 디폴트 상태 준비 완료 - 라운드 실행 예약');
                    
                    // 사용자에게 즉시 알림
                    this.elements.statusMessage.textContent = '🚀 모든 센서 준비 완료! 1초 후 라운드 시작...';
                    
                    // 기존 타이머 정리
                    if (this.defaultStateTimer) {
                        clearTimeout(this.defaultStateTimer);
                        this.defaultStateTimer = null;
                    }
                    
                    // 1초 후 라운드 실행 (한 번만 실행되도록 보장)
                    this.defaultStateTimer = setTimeout(() => {
                        console.log('⏰ 1초 대기 완료 - 라운드 실행 시작');
                        this.defaultStateTimer = null;
                        this.startRoundExecution();
                    }, 1000);
                }
            }
            
            startRoundExecution() {
                // 중복 실행 방지 - 이미 라운드가 실행 중이면 무시
                if (this.responseTimer) {
                    console.warn('⚠️ 라운드 이미 실행 중 - 중복 실행 방지');
                    return;
                }
                
                console.log('🎯 라운드 실행 시작');
                
                const { command, gender } = this.currentRoundData;
                
                // 라운드 시작 시간 기록
                this.currentRoundData.startTime = Date.now();
                
                // 명령과 정답 로그 출력
                console.log(`🚩 라운드 ${this.currentRound}: ${gender} 성별로 "${command}" 명령`);
                console.log('📋 정답:', Object.fromEntries(this.currentRoundData.correctResponses));
                
                // 상태 메시지 업데이트
                this.elements.statusMessage.textContent = `${gender === 'male' ? '👨' : '👩'} ${command.toUpperCase()} - 3초 이내에 반응하세요!`;
                
                // 명령 표시
                this.showCommand(command, gender);
                
                // 음성 재생
                this.playVoiceCommand(command, gender);
                
                // 응답 타이머 시작
                this.startResponseTimer();
                
                // 라운드 시작 알림 전송 - Signal Flags v2 전용 이벤트명 사용
                if (this.sdk && this.sdk.socket) {
                    this.sdk.socket.emit('signal-flags-v2-round-start', {
                        sessionCode: this.elements.sessionCode.textContent,
                        roundNumber: this.currentRound,
                        command: command,
                        gender: gender,
                        responseTime: this.config.responseTime
                    });
                }
            }
            
            showCommand(command, gender) {
                // 아이콘 설정
                this.elements.commanderIcon.textContent = gender === 'male' ? '👨' : '👩';
                
                // 명령 텍스트
                this.elements.commandText.textContent = command.toUpperCase();
                this.elements.commandText.className = `command-text ${gender}`;
                
                // 힌트 텍스트
                const hint = gender === 'female' ? 
                    `👩 여성: ${this.getKoreanDirection(command)}로 움직이세요` :
                    `👨 남성: ${this.getKoreanDirection(this.getOppositeDirection(command))}로 움직이세요`;
                this.elements.actionHint.textContent = hint;
                
                // 표시 설정
                this.elements.commandDisplay.className = `command-display visible ${gender}`;
                
                console.log(`📢 명령 표시: ${gender} says "${command}"`);
            }
            
            getKoreanDirection(direction) {
                const directions = {
                    'up': '위',
                    'down': '아래',
                    'left': '왼쪽',
                    'right': '오른쪽'
                };
                return directions[direction] || direction;
            }
            
            getOppositeDirection(direction) {
                const opposites = {
                    'up': 'down',
                    'down': 'up',
                    'left': 'right',
                    'right': 'left'
                };
                return opposites[direction] || direction;
            }
            
            playVoiceCommand(command, gender) {
                try {
                    // 오디오 파일 재생 시도
                    const audioPath = `/games/signal-flags-v2/assets/${gender}/_${command}.m4a`;
                    const audio = new Audio(audioPath);
                    
                    audio.play().then(() => {
                        console.log(`🔊 음성 재생 성공: ${audioPath}`);
                    }).catch((error) => {
                        console.warn(`🔊 음성 재생 실패: ${audioPath}`, error);
                        // TTS 폴백
                        this.playTTSFallback(command, gender);
                    });
                    
                } catch (error) {
                    console.warn('🔊 오디오 로드 실패:', error);
                    this.playTTSFallback(command, gender);
                }
            }
            
            playTTSFallback(command, gender) {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(this.getKoreanDirection(command));
                    utterance.lang = 'ko-KR';
                    utterance.rate = 1.0;
                    utterance.pitch = gender === 'male' ? 0.6 : 1.4;
                    
                    speechSynthesis.speak(utterance);
                    console.log(`🗣️ TTS 폴백 재생: ${command} (${gender})`);
                } else {
                    console.warn('⚠️ TTS 지원하지 않는 브라우저');
                }
            }
            
            startResponseTimer() {
                let timeLeft = this.config.responseTime;
                this.elements.timerFill.style.width = '100%';
                
                this.responseTimer = setInterval(() => {
                    timeLeft -= 100;
                    const percentage = (timeLeft / this.config.responseTime) * 100;
                    this.elements.timerFill.style.width = `${Math.max(0, percentage)}%`;
                    
                    if (timeLeft <= 0) {
                        this.endRound();
                    }
                }, 100);
            }
            
            handleSensorData(data) {
                // PC 게임에서는 센서 데이터를 직접 처리하지 않음
                // 센서 클라이언트에서 처리된 이벤트만 수신
                // 디버깅용 로그만 출력
                if (this.gameState === 'playing') {
                    // 게임 중에만 간단한 로그 출력 (스팸 방지)
                    if (Math.random() < 0.01) { // 1% 확률로만 로그 출력
                        console.log(`📡 센서 데이터 수신 중... (${data.sensorId})`);
                    }
                }
            }
            
            // PC 게임에서는 센서 클라이언트가 보내는 이벤트만 처리하므로 
            // detectDirection 함수는 제거됨
            
            handlePlayerResponse(data) {
                const { sensorId, direction, responseTime } = data;
                
                // 게임 상태 확인 - 게임 중이 아니면 무시
                if (this.gameState !== 'playing') {
                    console.log(`⚠️ 게임 중이 아님 - ${sensorId} 응답 무시 (상태: ${this.gameState})`);
                    return;
                }
                
                // 이미 응답한 센서는 무시 (중복 응답 방지)
                if (this.currentRoundData.responses.has(sensorId)) {
                    console.log(`⚠️ ${sensorId} 이미 응답함 - 중복 응답 무시`);
                    return;
                }
                
                // 정답 확인
                const correctResponse = this.currentRoundData.correctResponses.get(sensorId);
                const isCorrect = direction === correctResponse;
                
                // 응답 저장 (한 번만 저장됨을 보장)
                this.currentRoundData.responses.set(sensorId, {
                    direction: direction,
                    responseTime: responseTime,
                    timestamp: Date.now(),
                    isCorrect: isCorrect
                });
                
                console.log(`🎯 플레이어 응답 접수: ${sensorId} → ${direction} (정답: ${correctResponse}) ${isCorrect ? '✅' : '❌'} [응답 ${this.currentRoundData.responses.size}/${this.connectedSensors.size}]`);
                
                // 즉시 점수 업데이트 (한 번만 실행됨)
                if (sensorId.includes('1') || sensorId === 'sensor1') {
                    this.scores.player1 = Math.max(0, this.scores.player1 + (isCorrect ? 1 : -1));
                    console.log(`📊 플레이어 1 점수: ${this.scores.player1} (${isCorrect ? '+1' : '-1'})`);
                } else {
                    this.scores.player2 = Math.max(0, this.scores.player2 + (isCorrect ? 1 : -1));
                    console.log(`📊 플레이어 2 점수: ${this.scores.player2} (${isCorrect ? '+1' : '-1'})`);
                }
                
                // 즉시 점수 표시 업데이트
                this.updateScoreDisplay();
                
                // 모든 플레이어가 응답했으면 라운드 종료
                if (this.currentRoundData.responses.size >= this.connectedSensors.size) {
                    console.log('🏁 모든 플레이어 응답 완료 - 라운드 즉시 종료');
                    this.endRound();
                }
            }
            
            endRound() {
                console.log('🏁 라운드 종료');
                
                // 타이머 정리
                if (this.responseTimer) {
                    clearInterval(this.responseTimer);
                    this.responseTimer = null;
                }
                
                // 결과 계산
                this.calculateRoundResults();
                
                // 명령 표시 숨김
                this.elements.commandDisplay.classList.remove('visible');
                
                // 점수 업데이트
                this.updateScoreDisplay();
                
                // 다음 라운드 또는 게임 종료 준비
                setTimeout(() => {
                    if (this.currentRound >= this.config.maxRounds) {
                        this.endGame();
                    } else {
                        // 디폴트 상태 감지를 위해 다음 라운드 준비
                        this.startNextRound();
                    }
                }, 1500); // 1.5초로 단축
            }
            
            calculateRoundResults() {
                console.log('📊 라운드 결과 계산');
                
                const results = new Map();
                
                // 응답한 센서들 결과 정리 (점수는 이미 처리됨)
                for (const [sensorId, response] of this.currentRoundData.responses) {
                    const correctResponse = this.currentRoundData.correctResponses.get(sensorId);
                    
                    results.set(sensorId, {
                        response: response.direction,
                        correct: correctResponse,
                        isCorrect: response.isCorrect,
                        points: response.isCorrect ? 1 : -1,
                        responseTime: response.responseTime
                    });
                }
                
                // 응답하지 않은 센서들 처리 (시간 초과) - 점수 차감
                for (const sensorId of this.connectedSensors) {
                    if (!this.currentRoundData.responses.has(sensorId)) {
                        console.log(`⏰ ${sensorId} 시간 초과 - 점수 차감`);
                        
                        results.set(sensorId, {
                            response: null,
                            correct: this.currentRoundData.correctResponses.get(sensorId),
                            isCorrect: false,
                            points: -1,
                            responseTime: null
                        });
                        
                        // 점수 차감
                        if (sensorId.includes('1') || sensorId === 'sensor1') {
                            this.scores.player1 = Math.max(0, this.scores.player1 - 1);
                            console.log(`📊 플레이어 1 시간초과 점수: ${this.scores.player1} (-1)`);
                        } else {
                            this.scores.player2 = Math.max(0, this.scores.player2 - 1);
                            console.log(`📊 플레이어 2 시간초과 점수: ${this.scores.player2} (-1)`);
                        }
                    }
                }
                
                console.log('📊 최종 라운드 결과:', {
                    results: Object.fromEntries(results),
                    scores: this.scores,
                    command: this.currentRoundData.command,
                    gender: this.currentRoundData.gender
                });
                
                // 결과를 센서 클라이언트에 전송
                if (this.sdk && this.sdk.socket) {
                    this.sdk.socket.emit('round-results', {
                        sessionCode: this.elements.sessionCode.textContent,
                        roundNumber: this.currentRound,
                        results: Object.fromEntries(results),
                        scores: this.scores
                    });
                }
            }
            
            updateScoreDisplay() {
                this.elements.player1Score.textContent = this.scores.player1;
                this.elements.player2Score.textContent = this.scores.player2;
            }
            
            endGame() {
                console.log('🏆 게임 종료');
                this.gameState = 'finished';
                
                // 승자 결정
                let resultType, resultText;
                if (this.scores.player1 > this.scores.player2) {
                    resultType = 'win';
                    resultText = '🏆 플레이어 1 승리!';
                } else if (this.scores.player2 > this.scores.player1) {
                    resultType = 'win';
                    resultText = '🏆 플레이어 2 승리!';
                } else {
                    resultType = 'draw';
                    resultText = '🤝 무승부!';
                }
                
                // 결과 화면 표시
                this.elements.resultTitle.textContent = resultText;
                this.elements.resultTitle.className = `result-title ${resultType}`;
                this.elements.finalScores.textContent = `최종 점수 - 플레이어 1: ${this.scores.player1}점, 플레이어 2: ${this.scores.player2}점`;
                
                // UI 전환
                this.elements.playersContainer.classList.add('hidden');
                this.elements.resultScreen.classList.add('visible');
                this.elements.sessionInfo.classList.add('visible');
                this.elements.startBtn.disabled = false;
                this.elements.startBtn.textContent = '🚩 다시 시작';
                
                // 게임 종료 알림 전송
                if (this.sdk && this.sdk.socket) {
                    this.sdk.socket.emit('game-ended', {
                        sessionCode: this.elements.sessionCode.textContent,
                        finalScores: this.scores,
                        winner: this.scores.player1 > this.scores.player2 ? 'player1' : 
                                this.scores.player2 > this.scores.player1 ? 'player2' : 'draw'
                    });
                }
            }
            
            resetGame() {
                console.log('🔄 게임 리셋');
                
                // 타이머 정리
                if (this.responseTimer) {
                    clearInterval(this.responseTimer);
                    this.responseTimer = null;
                }
                if (this.defaultStateTimer) {
                    clearTimeout(this.defaultStateTimer);
                    this.defaultStateTimer = null;
                }
                
                // 상태 초기화
                this.gameState = this.connectedSensors.size >= 2 ? 'ready' : 'waiting';
                this.currentRound = 0;
                this.scores = { player1: 0, player2: 0 };
                this.sensorsInDefaultState.clear(); // 디폴트 상태 추적 초기화
                this.currentRoundData = {
                    command: null,
                    gender: null,
                    responses: new Map(),
                    correctResponses: new Map(),
                    startTime: 0
                };
                
                // UI 초기화
                this.elements.roundInfo.textContent = '게임 준비 중...';
                this.elements.statusMessage.textContent = this.connectedSensors.size >= 2 ? 
                    '모든 센서가 연결되었습니다! 게임을 시작하세요.' :
                    `센서 연결 중... (${this.connectedSensors.size}/2)`;
                this.elements.commandDisplay.classList.remove('visible');
                this.elements.timerFill.style.width = '100%';
                this.elements.playersContainer.classList.remove('hidden');
                this.elements.resultScreen.classList.remove('visible');
                this.elements.startBtn.disabled = this.connectedSensors.size < 2;
                this.elements.startBtn.textContent = '🚩 게임 시작';
                
                this.updateScoreDisplay();
                this.updateGameReadiness();
            }
        }
        
        // 게임 시작
        document.addEventListener('DOMContentLoaded', () => {
            new SignalFlagsV2Refactored();
        });
    </script>
</body>
</html>

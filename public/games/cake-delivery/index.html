
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎂 아슬아슬 케이크 배달단</title>
    <style>
        :root {
            --primary: #3b82f6; --secondary: #8b5cf6; --success: #10b981;
            --warning: #f59e0b; --error: #ef4444; --background: #0f172a;
            --surface: #1e293b; --text-primary: #f8fafc; --text-secondary: #cbd5e1;
        }
        body { 
            margin: 0; overflow: hidden; background-color: var(--background); 
            color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        #gameContainer { width: 100%; height: 100%; position: relative; }
        #gameCanvas { display: block; }
        .ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: none; text-align: center;
        }
        .session-panel {
            position: absolute; top: 20px; left: 20px; background: rgba(30, 41, 59, 0.8);
            padding: 15px; border-radius: 12px; backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: auto;
        }
        .session-title { font-size: 24px; font-weight: bold; color: var(--primary); }
        .session-code { font-size: 48px; font-weight: bold; letter-spacing: 4px; color: var(--warning); }
        .qr-container { width: 160px; height: 160px; background: white; border-radius: 8px; padding: 5px;}
        .qr-container img { width: 100%; height: 100%; }
        .connection-status { display: flex; gap: 10px; margin-top: 10px; }
        .player-status { padding: 8px 12px; border-radius: 8px; font-weight: bold; }
        .player-status.connected { background-color: var(--success); color: white; }
        .player-status.disconnected { background-color: var(--error); color: white; }
        .game-message {
            background: rgba(30, 41, 59, 0.9); padding: 20px 40px; border-radius: 15px;
            font-size: 3em; font-weight: bold; color: white; backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
        }
        .controls {
            position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto;
        }
        .controls button, .controls a {
            padding: 12px 20px; background-color: var(--primary); color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: bold; text-decoration: none; cursor: pointer;
            transition: background-color 0.2s;
        }
        .controls button:hover, .controls a:hover { background-color: #2563eb; }
        .mode-btn {
            padding: 8px 16px; background-color: var(--surface); color: var(--text-secondary); border: 2px solid var(--surface);
            border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .mode-btn:hover { background-color: var(--primary); color: white; border-color: var(--primary); }
        .mode-btn.active { background-color: var(--warning); color: var(--background); border-color: var(--warning); }
    </style>
</head>
<body>
    <audio id="bgm" src="./assets/bgm.mp3" loop></audio>
    <audio id="sfx-success" src="./assets/success.mp3"></audio>
    <audio id="sfx-fail" src="./assets/fail.mp3"></audio>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div class="ui-overlay">
            <div id="messageBox" class="game-message">플레이어 연결 대기중...</div>
            <div class="score-display" style="position: absolute; top: 20px; right: 20px; background: rgba(30, 41, 59, 0.8); padding: 15px; border-radius: 12px; backdrop-filter: blur(5px); pointer-events: auto; text-align: right;">
                <div style="font-size: 1.5em; font-weight: bold; color: var(--text-primary);">점수: <span id="currentScore">0</span></div>
                <div style="font-size: 1em; color: var(--text-secondary);">최고 기록: <span id="highScore">0</span></div>
                <div id="timerDisplay" style="font-size: 1.2em; font-weight: bold; color: var(--warning); margin-top: 10px; display: none;">
                    ⏱️ <span id="timeRemaining">60</span>초
                </div>
                <div id="gameModeDisplay" style="font-size: 0.9em; color: var(--text-secondary); margin-top: 5px;">
                    모드: <span id="currentGameMode">일반</span>
                </div>
            </div>
        </div>
        <div class="session-panel">
            <div class="session-title">🎂 케이크 배달단</div>
            <div id="sessionCode" class="session-code">----</div>
            <div id="qrContainer" class="qr-container"></div>
            <div class="connection-status">
                <div id="player1Status" class="player-status disconnected">P1</div>
                <div id="player2Status" class="player-status disconnected">P2</div>
            </div>
        </div>
        <div class="controls">
            <button id="resetButton" style="display: none;">🔄 재시작</button>
            <div id="gameModeSelector" style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button id="normalMode" class="mode-btn">🍰 일반</button>
                <button id="timeAttackMode" class="mode-btn">⏱️ 타임어택</button>
                <button id="endlessMode" class="mode-btn">♾️ 무한</button>
            </div>
            <a href="/">🏠 허브로</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- fflate 라이브러리 직접 임베드 -->
    <script>
        // fflate 핵심 함수들을 직접 정의 (FBXLoader가 필요한 최소 기능만)
        window.fflate = {
            inflateRaw: function(data, options) {
                // 기본 inflate 함수 스텁 - 실제로는 압축 해제 불가능하지만 FBXLoader 오류 방지
                console.warn('fflate.inflateRaw 스텁 호출됨 - 압축 해제 불가');
                return new Uint8Array(0);
            },
            unzlibSync: function(data, options) {
                // 기본 unzlib 함수 스텁
                console.warn('fflate.unzlibSync 스텁 호출됨 - 압축 해제 불가');
                return new Uint8Array(0);
            }
        };
        
        // 모든 스코프에 fflate 설정
        self.fflate = window.fflate;
        globalThis.fflate = window.fflate;
        
        console.log('🔧 fflate 스텁 라이브러리 생성됨');
    </script>
    
    <!-- GLTFLoader 사용으로 변경 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script>
        // GLTFLoader 로딩 완료 표시
        if (typeof THREE.GLTFLoader !== 'undefined') {
            console.log('✅ GLTFLoader 로드 성공');
            window.librariesLoaded = true;
        } else {
            console.error('❌ GLTFLoader 로드 실패');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator/qrcode.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/SessionSDK.js"></script>

    <script>
        class CakeDeliveryGame {
            constructor() {
                this.sdk = new SessionSDK({
                    gameId: 'cake-delivery',
                    gameType: 'dual',
                    debug: false
                });

                this.gameState = 'waiting'; // waiting, ready, playing, success, fail, level_clear
                this.level = 1;
                this.maxLevel = 5;
                this.gameMode = 'normal'; // 'normal', 'timeAttack', 'endless'
                this.timeLimit = 0;
                this.timeRemaining = 0;
                this.players = {};
                this.cake = {};
                this.obstacles = [];
                this.destination = null;
                this.particles = [];
                this.powerUps = [];
                this.activePowerUps = {
                    slowMotion: { active: false, endTime: 0, duration: 10000 },
                    safeZone: { active: false, endTime: 0, duration: 8000 },
                    extendedRange: { active: false, endTime: 0, duration: 12000 }
                };
                this.cameraShake = { intensity: 0, decay: 0 };
                this.currentScore = 0;
                this.highScore = parseInt(localStorage.getItem('cakeDeliveryHighScore') || '0');
                
                // 3D 모델 및 애니메이션 시스템 - 기본 모델로 변경
                this.fbxLoader = null;
                this.loadedModels = {};
                this.animationMixers = [];
                this.clock = new THREE.Clock();
                
                // 고급 점수 시스템
                this.scoreSystem = {
                    levelStartTime: 0,
                    totalStabilityScore: 0,
                    stabilityChecks: 0,
                    perfectDeliveryBonus: 1000,
                    timeBonus: 0,
                    stabilityBonus: 0,
                    efficiencyBonus: 0,
                    comboMultiplier: 1
                };

                this.levelConfig = {
                    1: { forwardSpeed: 0.1, obstacles: 2, holes: 1, movingObstacles: 1, rotatingObstacles: 0 },
                    2: { forwardSpeed: 0.12, obstacles: 3, holes: 2, movingObstacles: 1, rotatingObstacles: 1 },
                    3: { forwardSpeed: 0.15, obstacles: 4, holes: 3, movingObstacles: 2, rotatingObstacles: 1 },
                    4: { forwardSpeed: 0.18, obstacles: 5, holes: 4, movingObstacles: 2, rotatingObstacles: 2 },
                    5: { forwardSpeed: 0.2, obstacles: 6, holes: 5, movingObstacles: 3, rotatingObstacles: 2 },
                };

                this.initUI();
                this.init3D();
                this.initAudio();
                this.setupEvents();
                
                this.animate = this.animate.bind(this);
                this.animate();
            }


            initUI() {
                this.messageBox = document.getElementById('messageBox');
                this.resetButton = document.getElementById('resetButton');
                this.resetButton.onclick = () => this.resetGame();
                this.currentScoreDisplay = document.getElementById('currentScore');
                this.highScoreDisplay = document.getElementById('highScore');
                this.timerDisplay = document.getElementById('timerDisplay');
                this.timeRemainingDisplay = document.getElementById('timeRemaining');
                this.gameModeDisplay = document.getElementById('currentGameMode');
                
                // 게임 모드 버튼 이벤트
                document.getElementById('normalMode').onclick = () => this.setGameMode('normal');
                document.getElementById('timeAttackMode').onclick = () => this.setGameMode('timeAttack');
                document.getElementById('endlessMode').onclick = () => this.setGameMode('endless');
                
                this.updateScoreDisplay();
                this.updateGameModeDisplay();
            }

            init3D() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 15, 10);
                this.camera.lookAt(0, 0, 0);

                this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.shadowMap.enabled = true;

                // 조명
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                this.scene.add(ambientLight);
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(10, 20, 5);
                directionalLight.castShadow = true;
                this.scene.add(directionalLight);

                // 별 배경 추가
                const starsGeometry = new THREE.BufferGeometry();
                const starsMaterial = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.5 });
                const starVertices = [];
                for (let i = 0; i < 10000; i++) {
                    const x = (Math.random() - 0.5) * 2000;
                    const y = (Math.random() - 0.5) * 2000;
                    const z = (Math.random() - 0.5) * 2000;
                    starVertices.push(x, y, z);
                }
                starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
                this.stars = new THREE.Points(starsGeometry, starsMaterial);
                this.scene.add(this.stars);

                this.roadWidth = 15; // 도로 폭 감소
                const floorGeometry = new THREE.PlaneGeometry(this.roadWidth, 100);
                const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x4a5568 });
                const floor = new THREE.Mesh(floorGeometry, floorMaterial);
                floor.rotation.x = -Math.PI / 2;
                floor.position.y = -0.5;
                floor.position.z = -50; // 도로 시작 위치 조정
                floor.receiveShadow = true;
                this.scene.add(floor);
            }

            createCustomPlayerModel(playerId) {
                const group = new THREE.Group();
                
                // 플레이어별 색상 설정
                const colors = {
                    'Player1': { primary: '#3b82f6', secondary: '#1e40af' },
                    'Player2': { primary: '#ef4444', secondary: '#dc2626' }
                };
                
                const color = colors[playerId] || colors['Player1'];
                
                // 몸통 (실린더 형태)
                const bodyGeometry = new THREE.CylinderGeometry(0.3, 0.3, 1.2, 8);
                const bodyMaterial = new THREE.MeshPhongMaterial({ 
                    color: color.primary,
                    shininess: 100
                });
                const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                body.position.y = 0.6;
                group.add(body);
                
                // 머리
                const headGeometry = new THREE.SphereGeometry(0.25, 8, 8);
                const headMaterial = new THREE.MeshPhongMaterial({ 
                    color: color.secondary,
                    shininess: 100
                });
                const head = new THREE.Mesh(headGeometry, headMaterial);
                head.position.y = 1.5;
                group.add(head);
                
                // 팔 (왼쪽)
                const armGeometry = new THREE.CylinderGeometry(0.08, 0.08, 0.8, 6);
                const armMaterial = new THREE.MeshPhongMaterial({ 
                    color: color.primary,
                    shininess: 100
                });
                const leftArm = new THREE.Mesh(armGeometry, armMaterial);
                leftArm.position.set(-0.4, 0.8, 0);
                leftArm.rotation.z = Math.PI / 6;
                group.add(leftArm);
                
                // 팔 (오른쪽)
                const rightArm = new THREE.Mesh(armGeometry, armMaterial);
                rightArm.position.set(0.4, 0.8, 0);
                rightArm.rotation.z = -Math.PI / 6;
                group.add(rightArm);
                
                // 다리 (왼쪽)
                const legGeometry = new THREE.CylinderGeometry(0.1, 0.1, 0.9, 6);
                const legMaterial = new THREE.MeshPhongMaterial({ 
                    color: color.secondary,
                    shininess: 100
                });
                const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
                leftLeg.position.set(-0.15, -0.45, 0);
                group.add(leftLeg);
                
                // 다리 (오른쪽)
                const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
                rightLeg.position.set(0.15, -0.45, 0);
                group.add(rightLeg);
                
                // 그림자 설정
                group.traverse((child) => {
                    if (child instanceof THREE.Mesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                // 애니메이션 상태 저장
                group.userData = {
                    bodyParts: { body, head, leftArm, rightArm, leftLeg, rightLeg },
                    animationState: 'idle',
                    animationTime: 0
                };
                
                console.log(`✨ 커스텀 플레이어 모델 생성 완료: ${playerId}`);
                return group;
            }

            updatePlayerAnimation(player, animationName) {
                // 커스텀 애니메이션 시스템 - 간단한 포즈 변경
                const bodyParts = player.mesh.userData.bodyParts;
                const time = Date.now() * 0.001; // 시간 기반 애니메이션
                
                switch(animationName) {
                    case 'idle':
                        // 기본 자세 - 약간의 호흡 애니메이션
                        bodyParts.body.position.y = 0.6 + Math.sin(time * 2) * 0.02;
                        bodyParts.head.position.y = 1.5 + Math.sin(time * 2) * 0.02;
                        bodyParts.leftArm.rotation.z = Math.PI / 6 + Math.sin(time * 1.5) * 0.1;
                        bodyParts.rightArm.rotation.z = -Math.PI / 6 - Math.sin(time * 1.5) * 0.1;
                        break;
                        
                    case 'pulling':
                        // 당기는 동작 - 뒤로 기울이기
                        bodyParts.body.rotation.z = Math.sin(time * 4) * 0.3;
                        bodyParts.leftArm.rotation.z = Math.PI / 3 + Math.sin(time * 3) * 0.2;
                        bodyParts.rightArm.rotation.z = -Math.PI / 3 - Math.sin(time * 3) * 0.2;
                        break;
                        
                    case 'pushing':
                        // 미는 동작 - 앞으로 기울이기
                        bodyParts.body.rotation.z = Math.sin(time * 4) * -0.3;
                        bodyParts.leftArm.rotation.z = Math.PI / 8 + Math.sin(time * 3) * 0.1;
                        bodyParts.rightArm.rotation.z = -Math.PI / 8 - Math.sin(time * 3) * 0.1;
                        break;
                        
                    case 'moving':
                        // 이동 동작 - 걷기 애니메이션
                        const walkCycle = Math.sin(time * 8);
                        bodyParts.leftLeg.rotation.x = walkCycle * 0.5;
                        bodyParts.rightLeg.rotation.x = -walkCycle * 0.5;
                        bodyParts.leftArm.rotation.x = -walkCycle * 0.3;
                        bodyParts.rightArm.rotation.x = walkCycle * 0.3;
                        break;
                }
                
                player.mesh.userData.animationState = animationName;
                player.mesh.userData.animationTime = time;
            }

            setupEvents() {
                this.sdk.on('connected', () => this.sdk.createSession());

                this.sdk.on('session-created', (event) => {
                    const session = event.detail || event;
                    this.displaySessionInfo(session);
                });

                this.sdk.on('sensor-connected', (event) => {
                    const data = event.detail || event;
                    this.addPlayer(data.sensorId);
                    this.updatePlayerStatus();
                });

                this.sdk.on('sensor-disconnected', (event) => {
                    const data = event.detail || event;
                    this.removePlayer(data.sensorId);
                    this.updatePlayerStatus();
                });

                this.sdk.on('game-ready', () => {
                    this.gameState = 'ready';
                    this.messageBox.textContent = '3초 후 시작!';
                    setTimeout(() => {
                        this.sdk.startGame();
                        this.gameState = 'playing';
                        this.messageBox.style.display = 'none';
                        this.scoreSystem.levelStartTime = Date.now(); // 레벨 시작 시간 기록
                    }, 3000);
                });

                this.sdk.on('sensor-data', (event) => {
                    const data = event.detail || event;
                    if (this.gameState === 'playing' && this.players[data.sensorId]) {
                        this.updatePlayerPosition(data.sensorId, data.data.orientation);
                    }
                });

                window.addEventListener('resize', () => this.onWindowResize(), false);
            }

            displaySessionInfo(session) {
                document.getElementById('sessionCode').textContent = session.sessionCode;
                const qrUrl = `${window.location.origin}/sensor.html?session=${session.sessionCode}`;
                const qrContainer = document.getElementById('qrContainer');
                qrContainer.innerHTML = '';

                try {
                    if (typeof qrcode !== 'undefined') {
                        const qr = qrcode(0, 'L');
                        qr.addData(qrUrl);
                        qr.make();
                        qrContainer.innerHTML = qr.createImgTag(4);
                    } else { throw new Error('qrcode.js not loaded'); }
                } catch (e) {
                    console.warn('QR code generator failed, using fallback API.');
                    const img = document.createElement('img');
                    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(qrUrl)}`;
                    qrContainer.appendChild(img);
                }
            }

            createPlayerModel(isPlayer1) {
                // 새로운 커스텀 3D 모델 사용
                const playerId = isPlayer1 ? 'Player1' : 'Player2';
                const playerModel = this.createCustomPlayerModel(playerId);
                
                return {
                    mesh: playerModel,
                    mixer: null, // 커스텀 애니메이션 시스템 사용
                    animations: null,
                    currentAnimation: 'idle'
                };
            }

            createFallbackPlayer(isPlayer1) {
                // 기존 방식의 플레이어 생성 (모델 로딩 실패 시 폴백)
                const playerColor = isPlayer1 ? 0x3b82f6 : 0x8b5cf6;
                const geometry = new THREE.CylinderGeometry(0.5, 0.5, 1, 32);
                const material = new THREE.MeshStandardMaterial({ color: playerColor });
                const playerMesh = new THREE.Mesh(geometry, material);
                playerMesh.castShadow = true;

                // 폴백 모델에는 라벨을 추가하지 않음 (addPlayer에서 추가됨)

                return {
                    mesh: playerMesh,
                    mixer: null,
                    animations: null,
                    currentAnimation: null
                };
            }

            switchPlayerAnimation(player, animationName) {
                // 커스텀 애니메이션 시스템으로 교체
                this.updatePlayerAnimation(player, animationName);
                player.currentAnimation = animationName;
            }

            addPlayer(sensorId) {
                const playerCount = Object.keys(this.players).length;
                const isPlayer1 = playerCount === 0;
                const startX = isPlayer1 ? -2 : 2;
                const playerLabel = isPlayer1 ? '1P' : '2P';

                // 새로운 3D 모델 생성
                const playerData = this.createPlayerModel(isPlayer1);
                playerData.mesh.position.set(startX, 0, 0);

                // 플레이어 라벨 추가 (3D 모델에도)
                const labelSprite = this.makeTextSprite(playerLabel, { 
                    fontsize: 96, 
                    fontface: 'Arial', 
                    borderColor: { r:255, g:0, b:0, a:1.0 } 
                });
                labelSprite.position.set(0, 3, 0); // 3D 모델은 키가 더 클 수 있으므로 높이 조정
                playerData.mesh.add(labelSprite);

                this.scene.add(playerData.mesh);

                this.players[sensorId] = {
                    id: sensorId,
                    mesh: playerData.mesh,
                    mixer: playerData.mixer,
                    animations: playerData.animations,
                    currentAnimation: playerData.currentAnimation,
                    velocity: new THREE.Vector3(),
                    acceleration: new THREE.Vector3(),
                    mass: 1.0,
                    friction: 0.92,  // 마찰력을 0.95에서 0.92로 증가 (더 빨리 멈춤)
                    maxSpeed: 0.15,   // 최대 속도를 0.3에서 0.15로 절반으로 줄임
                    previousVelocity: new THREE.Vector3(), // 애니메이션 결정을 위한 이전 속도
                    animationTimer: 0 // 애니메이션 전환 딜레이용
                };

                if (Object.keys(this.players).length === 2 && !this.cake.mesh) {
                    this.createCake();
                    this.createLevel();
                }
            }

            removePlayer(sensorId) {
                if (this.players[sensorId]) {
                    const player = this.players[sensorId];
                    
                    // 3D 모델 제거
                    this.scene.remove(player.mesh);
                    
                    // 애니메이션 믹서 정리
                    if (player.mixer) {
                        const mixerIndex = this.animationMixers.indexOf(player.mixer);
                        if (mixerIndex > -1) {
                            this.animationMixers.splice(mixerIndex, 1);
                        }
                    }
                    
                    delete this.players[sensorId];
                    this.setGameState('fail', '플레이어 연결 끊김!');
                }
            }

            updatePlayerStatus() {
                const playerIds = Object.keys(this.players);
                document.getElementById('player1Status').className = `player-status ${playerIds.length >= 1 ? 'connected' : 'disconnected'}`;
                document.getElementById('player2Status').className = `player-status ${playerIds.length >= 2 ? 'connected' : 'disconnected'}`;
            }

            createCake() {
                const cakeGeometry = new THREE.CylinderGeometry(1.5, 1.5, 1, 64);
                const cakeMaterial = new THREE.MeshStandardMaterial({ color: 0xf472b6 });
                this.cake.mesh = new THREE.Mesh(cakeGeometry, cakeMaterial);
                this.cake.mesh.castShadow = true;
                this.cake.velocity = new THREE.Vector3();
                this.cake.acceleration = new THREE.Vector3();
                this.cake.mass = 2.0; // 케이크는 플레이어보다 무거움
                this.cake.stability = 1.0; // 안정성 지수
                this.scene.add(this.cake.mesh);
            }
            
            createLevel() {
                // 기존 장애물, 구멍, 파워업 제거
                this.obstacles.forEach(obstacle => this.scene.remove(obstacle));
                this.obstacles = [];
                this.powerUps.forEach(powerUp => this.scene.remove(powerUp.mesh));
                this.powerUps = [];

                const config = this.levelConfig[this.level];
                const totalLength = 100; // 목적지까지의 총 길이
                const destinationZ = -totalLength; // 목적지 Z 좌표

                // 고정 장애물 생성
                const obstacleGeometry = new THREE.BoxGeometry(2, 2, 2);
                for(let i = 0; i < config.obstacles; i++) {
                    const obstacleMaterial = new THREE.MeshStandardMaterial({ color: 0xef4444 });
                    const obstacle = new THREE.Mesh(obstacleGeometry, obstacleMaterial);
                    obstacle.position.set(Math.random() * (this.roadWidth - 4) - (this.roadWidth / 2 - 2), 0, -10 - i * (totalLength / config.obstacles));
                    obstacle.castShadow = true;
                    this.scene.add(obstacle);
                    this.obstacles.push(obstacle);
                }

                // 구멍 생성 (단순히 어두운 평면으로 표현)
                const holeGeometry = new THREE.PlaneGeometry(3, 3);
                const holeMaterial = new THREE.MeshStandardMaterial({ color: 0x1a202c });
                for(let i = 0; i < config.holes; i++) {
                    const hole = new THREE.Mesh(holeGeometry, holeMaterial);
                    hole.rotation.x = -Math.PI / 2;
                    hole.position.set(Math.random() * (this.roadWidth - 4) - (this.roadWidth / 2 - 2), -0.45, -5 - i * (totalLength / config.holes));
                    this.scene.add(hole);
                    this.obstacles.push(hole); // 구멍도 충돌 체크 대상에 포함
                }

                // 움직이는 장애물 생성
                const movingObstacleGeometry = new THREE.BoxGeometry(3, 1, 1);
                const movingObstacleMaterial = new THREE.MeshStandardMaterial({ color: 0xffd700 });
                for(let i = 0; i < config.movingObstacles; i++) {
                    const movingObstacle = new THREE.Mesh(movingObstacleGeometry, movingObstacleMaterial);
                    movingObstacle.position.set(0, 0, -25 - i * (totalLength / config.movingObstacles));
                    movingObstacle.userData.moveDirection = Math.random() > 0.5 ? 1 : -1;
                    movingObstacle.userData.moveSpeed = 0.025 + Math.random() * 0.025;
                    movingObstacle.castShadow = true;
                    this.scene.add(movingObstacle);
                    this.obstacles.push(movingObstacle);
                }

                // 회전하는 장애물 생성
                const rotatingObstacleGeometry = new THREE.BoxGeometry(1, 5, 1);
                const rotatingObstacleMaterial = new THREE.MeshStandardMaterial({ color: 0x8a2be2 });
                for(let i = 0; i < config.rotatingObstacles; i++) {
                    const rotatingObstacle = new THREE.Mesh(rotatingObstacleGeometry, rotatingObstacleMaterial);
                    rotatingObstacle.position.set(0, 2.5, -30 - i * (totalLength / config.rotatingObstacles));
                    rotatingObstacle.userData.rotationSpeed = 0.05 + Math.random() * 0.05;
                    rotatingObstacle.castShadow = true;
                    this.scene.add(rotatingObstacle);
                    this.obstacles.push(rotatingObstacle);
                }

                // 목적지 위치 조정
                if (!this.destination) {
                    const destGeometry = new THREE.BoxGeometry(this.roadWidth, 1, 5);
                    const destMaterial = new THREE.MeshStandardMaterial({ color: 0x10b981, transparent: true, opacity: 0.5 });
                    this.destination = new THREE.Mesh(destGeometry, destMaterial);
                    this.scene.add(this.destination);
                }
                this.destination.position.set(0, -0.4, destinationZ);
                
                // 파워업 생성 (레벨당 2-3개)
                this.createPowerUps(totalLength);
            }

            createPowerUps(totalLength) {
                const powerUpTypes = [
                    { type: 'slowMotion', color: 0x00ffff, icon: '⏰' },
                    { type: 'safeZone', color: 0x00ff00, icon: '🛡️' },
                    { type: 'extendedRange', color: 0xff00ff, icon: '🔗' }
                ];
                
                const powerUpCount = 2 + Math.floor(this.level / 2); // 레벨별 파워업 개수 증가
                
                for(let i = 0; i < powerUpCount; i++) {
                    const powerUpType = powerUpTypes[Math.floor(Math.random() * powerUpTypes.length)];
                    
                    const geometry = new THREE.SphereGeometry(0.8, 16, 16);
                    const material = new THREE.MeshStandardMaterial({ 
                        color: powerUpType.color,
                        emissive: powerUpType.color,
                        emissiveIntensity: 0.3,
                        transparent: true,
                        opacity: 0.8
                    });
                    
                    const powerUpMesh = new THREE.Mesh(geometry, material);
                    powerUpMesh.position.set(
                        Math.random() * (this.roadWidth - 4) - (this.roadWidth / 2 - 2),
                        1,
                        -15 - i * (totalLength / powerUpCount)
                    );
                    
                    powerUpMesh.userData.type = powerUpType.type;
                    powerUpMesh.userData.rotationSpeed = 0.02;
                    
                    this.scene.add(powerUpMesh);
                    this.powerUps.push({
                        mesh: powerUpMesh,
                        type: powerUpType.type,
                        collected: false
                    });
                }
            }

            updatePlayerPosition(sensorId, orientation) {
                const player = this.players[sensorId];
                if (!player) return;

                const config = this.levelConfig[this.level];
                const sensitivity = 0.005; // 민감도를 절반으로 줄임 (0.01 → 0.005)
                const gravity = new THREE.Vector3(0, -0.001, 0); // 약간의 중력
                
                // 센서 입력을 힘으로 변환
                const forceX = (orientation.gamma || 0) * sensitivity;
                const forceZ = (orientation.beta || 0) * sensitivity - config.forwardSpeed;
                
                // 가속도 계산 (F = ma, a = F/m)
                player.acceleration.set(forceX / player.mass, 0, forceZ / player.mass);
                player.acceleration.add(gravity);
                
                // 속도 업데이트 (관성 적용)
                player.velocity.add(player.acceleration);
                
                // 마찰력 적용
                player.velocity.multiplyScalar(player.friction);
                
                // 최대 속도 제한
                if (player.velocity.length() > player.maxSpeed) {
                    player.velocity.normalize().multiplyScalar(player.maxSpeed);
                }
                
                // 위치 업데이트
                player.mesh.position.add(player.velocity);

                // 도로 이탈 방지
                const roadLimit = this.roadWidth / 2 - 0.5;
                player.mesh.position.x = THREE.MathUtils.clamp(player.mesh.position.x, -roadLimit, roadLimit);
                player.mesh.position.z = THREE.MathUtils.clamp(player.mesh.position.z, -100, 2);
                player.mesh.position.y = Math.max(0, player.mesh.position.y); // 바닥 아래로 떨어지지 않음
                
                // 애니메이션 전환 로직
                this.updatePlayerAnimation(player, orientation);
            }

            updatePlayerAnimation(player, orientation) {
                // 애니메이션이 없는 플레이어는 스킵
                if (!player.animations) return;
                
                // 애니메이션 전환 딜레이 (너무 빈번한 전환 방지)
                player.animationTimer++;
                if (player.animationTimer < 10) return; // 10프레임마다 체크
                player.animationTimer = 0;
                
                // 현재 속도 벡터 크기 계산
                const velocityMagnitude = player.velocity.length();
                const movementThreshold = 0.01; // 움직임 감지 임계값
                
                // 케이크와의 상대적 위치 확인 (당기기/밀기 판정)
                let targetAnimation = 'idle';
                
                if (velocityMagnitude > movementThreshold) {
                    // 케이크가 있고 2명의 플레이어가 있을 때만 당기기/밀기 판정
                    if (this.cake.mesh && Object.keys(this.players).length === 2) {
                        const playerPos = player.mesh.position;
                        const cakePos = this.cake.mesh.position;
                        
                        // 플레이어에서 케이크로의 벡터
                        const toCake = new THREE.Vector3().subVectors(cakePos, playerPos);
                        const velocityDirection = player.velocity.clone().normalize();
                        
                        // 내적을 이용해 방향 판정 (1에 가까우면 같은 방향, -1에 가까우면 반대 방향)
                        const dot = velocityDirection.dot(toCake.normalize());
                        
                        if (dot > 0.3) {
                            targetAnimation = 'pushing'; // 케이크 쪽으로 움직이면 밀기
                        } else if (dot < -0.3) {
                            targetAnimation = 'pulling'; // 케이크 반대로 움직이면 당기기
                        } else {
                            targetAnimation = 'idle'; // 애매한 경우는 대기
                        }
                    } else {
                        // 케이크가 없으면 단순히 움직이는 상태로
                        targetAnimation = 'pushing';
                    }
                }
                
                // 현재 애니메이션과 다르면 전환
                if (player.currentAnimation !== targetAnimation) {
                    this.switchPlayerAnimation(player, targetAnimation);
                }
            }

            updateCakePosition() {
                if (!this.cake.mesh || Object.keys(this.players).length < 2) return;

                const playerPositions = Object.values(this.players).map(p => p.mesh.position);
                const p1 = playerPositions[0];
                const p2 = playerPositions[1];
                const distance = p1.distanceTo(p2);
                
                // 플레이어 간 중간점 계산
                const targetPos = new THREE.Vector3((p1.x + p2.x) / 2, 0, (p1.z + p2.z) / 2);
                
                // 케이크에 작용하는 힘 계산 (관성과 중력 적용)
                const springForce = targetPos.clone().sub(this.cake.mesh.position).multiplyScalar(0.05);
                const dampingForce = this.cake.velocity.clone().multiplyScalar(-0.02); // 감쇠력
                const gravity = new THREE.Vector3(0, -0.002, 0);
                
                // 안정성에 따른 케이크 흔들림
                const instability = Math.max(0, distance - 3) * 0.01; // 거리 3 이상부터 불안정
                const shake = new THREE.Vector3(
                    (Math.random() - 0.5) * instability,
                    0,
                    (Math.random() - 0.5) * instability
                );
                
                // 전체 힘 합성
                this.cake.acceleration.copy(springForce).add(dampingForce).add(gravity).add(shake);
                
                // 케이크 속도 및 위치 업데이트
                this.cake.velocity.add(this.cake.acceleration);
                this.cake.velocity.multiplyScalar(0.98); // 케이크 마찰력
                this.cake.mesh.position.add(this.cake.velocity);
                
                // Y축 위치 제한
                this.cake.mesh.position.y = Math.max(0, this.cake.mesh.position.y);

                // 케이크 기울기 계산 (더 현실적으로)
                const tiltX = (p1.z - p2.z) * 0.05 + this.cake.velocity.z * 0.5;
                const tiltZ = (p2.x - p1.x) * 0.05 + this.cake.velocity.x * 0.5;
                
                this.cake.mesh.rotation.y = 0; // Y축 회전 고정
                this.cake.mesh.rotation.x += (tiltX - this.cake.mesh.rotation.x) * 0.1;
                this.cake.mesh.rotation.z += (tiltZ - this.cake.mesh.rotation.z) * 0.1;

                const tilt = Math.abs(this.cake.mesh.rotation.x) + Math.abs(this.cake.mesh.rotation.z);
                
                // 안정성 계산 및 점수
                this.cake.stability = Math.max(0, 1 - (distance / 10) - (tilt / 2));
                
                if (this.gameState === 'playing') {
                    this.updateStabilityScore(distance, tilt);
                }
                
                // 거리 확장 파워업 효과 적용
                const maxDistance = this.activePowerUps.extendedRange.active ? 10 : 7;
                
                if (distance > maxDistance) this.setGameState('fail', '너무 멀어요!');
                if (Math.abs(this.cake.mesh.rotation.x) > 0.8 || Math.abs(this.cake.mesh.rotation.z) > 0.8) {
                    this.setGameState('fail', '케이크가 떨어졌어요!');
                }

                // 도로 이탈 판정
                const roadLimit = this.roadWidth / 2 - 1.5;
                if (Math.abs(this.cake.mesh.position.x) > roadLimit) {
                    this.setGameState('fail', '도로 밖으로 이탈!');
                }
            }

            checkCollisions() {
                if (!this.cake.mesh) return;
                const cakeBox = new THREE.Box3().setFromObject(this.cake.mesh);

                // 장애물 충돌 체크 (안전지대 효과 확인)
                if (!this.activePowerUps.safeZone.active) {
                    for (const obstacle of this.obstacles) {
                        const obstacleBox = new THREE.Box3().setFromObject(obstacle);
                        if (cakeBox.intersectsBox(obstacleBox)) {
                            this.setGameState('fail', '장애물과 충돌!');
                            return;
                        }
                    }
                }

                // 파워업 충돌 체크
                for (const powerUp of this.powerUps) {
                    if (!powerUp.collected) {
                        const powerUpBox = new THREE.Box3().setFromObject(powerUp.mesh);
                        if (cakeBox.intersectsBox(powerUpBox)) {
                            this.collectPowerUp(powerUp);
                        }
                    }
                }

                const destBox = new THREE.Box3().setFromObject(this.destination);
                if (cakeBox.intersectsBox(destBox)) {
                    const scoreResult = this.calculateLevelScore();
                    this.currentScore += scoreResult.finalScore;
                    
                    if (this.gameMode === 'endless') {
                        // 무한모드: 계속 진행하면서 난이도 증가
                        this.setGameState('level_clear', 
                            `레벨 ${this.level} 클리어!\n` +
                            `점수: ${scoreResult.finalScore}점\n` +
                            `누적: ${this.currentScore}점`
                        );
                        this.level++;
                        // 무한모드에서는 레벨 설정을 동적으로 조정
                        this.adjustEndlessLevel();
                        setTimeout(() => this.resetGame(true), 2000);
                    } else if (this.level < this.maxLevel) {
                        this.setGameState('level_clear', 
                            `레벨 ${this.level} 클리어!\n` +
                            `점수: ${scoreResult.finalScore}점\n` +
                            `(기본: ${scoreResult.baseScore}, 시간: ${scoreResult.timeBonus}, ` +
                            `안정: ${scoreResult.stabilityBonus}, 효율: ${scoreResult.efficiencyBonus})`
                        );
                        this.level++;
                        setTimeout(() => this.resetGame(true), 3000);
                    } else {
                        this.currentScore += this.scoreSystem.perfectDeliveryBonus;
                        let successMessage = `최종 배달 성공!\n최종 점수: ${this.currentScore}점\n`;
                        
                        if (this.gameMode === 'timeAttack') {
                            const timeBonus = Math.floor(this.timeRemaining * 10);
                            this.currentScore += timeBonus;
                            successMessage += `시간 보너스: +${timeBonus}점!\n`;
                        }
                        
                        successMessage += `완주 보너스: +${this.scoreSystem.perfectDeliveryBonus}점!`;
                        this.setGameState('success', successMessage);
                    }
                }
            }

            adjustEndlessLevel() {
                // 무한모드 난이도 동적 조정
                const dynamicLevel = Math.min(10, Math.floor(this.level / 3) + 1);
                this.levelConfig[this.level] = {
                    forwardSpeed: 0.1 + (dynamicLevel * 0.02),
                    obstacles: Math.min(8, 1 + dynamicLevel),
                    holes: Math.min(6, Math.floor(dynamicLevel / 2)),
                    movingObstacles: Math.min(4, Math.floor(dynamicLevel / 2)),
                    rotatingObstacles: Math.min(3, Math.floor(dynamicLevel / 3))
                };
            }

            initAudio() {
                this.bgm = document.getElementById('bgm');
                this.sfxSuccess = document.getElementById('sfx-success');
                this.sfxFail = document.getElementById('sfx-fail');

                // BGM 자동 재생을 위한 처리 (사용자 제스처 필요)
                document.addEventListener('click', () => {
                    if (this.bgm.paused) {
                        this.bgm.play().catch(e => console.log("BGM play failed:", e));
                    }
                }, { once: true });
            }

            playSound(soundElement) {
                soundElement.currentTime = 0;
                soundElement.play().catch(e => console.log("Sound play failed:", e));
            }

            setGameState(state, message) {
                if (this.gameState === 'fail' || this.gameState === 'success') return;
                this.gameState = state;
                this.messageBox.textContent = message;
                this.messageBox.style.display = 'flex';
                if (state === 'fail' || state === 'success') {
                    this.resetButton.style.display = 'block';
                    this.bgm.pause();
                    if (state === 'success') {
                        this.playSound(this.sfxSuccess);
                        // 성공 시 화려한 불꽃놀이 효과
                        this.createParticles(this.cake.mesh.position, 0xffd700, 150, 'fire');
                        setTimeout(() => this.createParticles(this.cake.mesh.position, 0xff69b4, 100, 'fire'), 200);
                        setTimeout(() => this.createParticles(this.cake.mesh.position, 0x00ff00, 100, 'fire'), 400);
                        this.currentScore += (this.maxLevel * 100); // 최종 클리어 보너스
                    } else {
                        this.playSound(this.sfxFail);
                        // 실패 시 크림이 튀는 효과와 연기
                        this.createParticles(this.cake.mesh.position, 0xfff8dc, 200, 'cream');
                        setTimeout(() => this.createParticles(this.cake.mesh.position, 0x666666, 100, 'smoke'), 300);
                        this.startCameraShake(0.5, 500); // 실패 시 카메라 흔들림
                    }
                    this.updateHighScore();
                    this.updateScoreDisplay();
                } else if (state === 'playing') {
                    this.bgm.play().catch(e => console.log("BGM play failed:", e));
                } else if (state === 'level_clear') {
                    // 레벨 클리어 시 간단한 파티클 효과
                    this.createParticles(this.cake.mesh.position, 0x00ff00, 50, 'fire');
                    this.updateScoreDisplay();
                }
            }

            updateScoreDisplay() {
                this.currentScoreDisplay.textContent = this.currentScore;
                this.highScoreDisplay.textContent = this.highScore;
                
                if (this.gameMode === 'timeAttack' && this.gameState === 'playing') {
                    this.timeRemainingDisplay.textContent = Math.max(0, Math.ceil(this.timeRemaining));
                    if (this.timeRemaining <= 10) {
                        this.timerDisplay.style.color = 'var(--error)';
                    } else if (this.timeRemaining <= 30) {
                        this.timerDisplay.style.color = 'var(--warning)';
                    }
                }
            }

            setGameMode(mode) {
                if (this.gameState === 'playing') return; // 게임 중에는 모드 변경 불가
                
                this.gameMode = mode;
                
                // 모드별 설정
                switch(mode) {
                    case 'normal':
                        this.maxLevel = 5;
                        this.timerDisplay.style.display = 'none';
                        break;
                    case 'timeAttack':
                        this.maxLevel = 3; // 타임어택은 3레벨만
                        this.timeLimit = 180; // 3분
                        this.timeRemaining = this.timeLimit;
                        this.timerDisplay.style.display = 'block';
                        this.timerDisplay.style.color = 'var(--warning)';
                        break;
                    case 'endless':
                        this.maxLevel = 999; // 무한
                        this.timerDisplay.style.display = 'none';
                        break;
                }
                
                this.updateGameModeDisplay();
                this.resetGame();
            }

            updateGameModeDisplay() {
                const modeNames = {
                    'normal': '일반',
                    'timeAttack': '타임어택',
                    'endless': '무한모드'
                };
                
                this.gameModeDisplay.textContent = modeNames[this.gameMode];
                
                // 버튼 활성화 상태 업데이트
                document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById(this.gameMode === 'timeAttack' ? 'timeAttackMode' : 
                                     this.gameMode === 'endless' ? 'endlessMode' : 'normalMode').classList.add('active');
            }

            updateGameTimer() {
                if (this.gameMode === 'timeAttack') {
                    this.timeRemaining -= 1/60; // 60fps 기준으로 감소
                    this.updateScoreDisplay();
                    
                    if (this.timeRemaining <= 0) {
                        this.setGameState('fail', '시간 초과!');
                    }
                }
            }

            updateHighScore() {
                if (this.currentScore > this.highScore) {
                    this.highScore = this.currentScore;
                    localStorage.setItem('cakeDeliveryHighScore', this.highScore);
                }
            }

            updateStabilityScore(distance, tilt) {
                // 안정성 점수 계산 (0-100, 높을수록 좋음)
                const distanceScore = Math.max(0, 100 - (distance * 20)); // 거리 0-5 범위
                const tiltScore = Math.max(0, 100 - (tilt * 125)); // 기울기 0-0.8 범위
                const currentStability = (distanceScore + tiltScore) / 2;
                
                this.scoreSystem.totalStabilityScore += currentStability;
                this.scoreSystem.stabilityChecks++;
            }

            calculateLevelScore() {
                const levelTime = (Date.now() - this.scoreSystem.levelStartTime) / 1000; // 초 단위
                const avgStability = this.scoreSystem.totalStabilityScore / this.scoreSystem.stabilityChecks;
                
                // 시간 보너스 (빠를수록 높은 점수, 최대 500점)
                const timeTarget = 30 + (this.level * 10); // 레벨별 목표 시간
                this.scoreSystem.timeBonus = Math.max(0, Math.floor(500 * (timeTarget - levelTime) / timeTarget));
                
                // 안정성 보너스 (안정할수록 높은 점수, 최대 300점)
                this.scoreSystem.stabilityBonus = Math.floor(avgStability * 3);
                
                // 효율성 보너스 (거리와 시간 조합, 최대 200점)
                const efficiency = Math.min(100, avgStability * (timeTarget / levelTime));
                this.scoreSystem.efficiencyBonus = Math.floor(efficiency * 2);
                
                // 콤보 멀티플라이어 (연속 레벨 클리어)
                if (this.level > 1) {
                    this.scoreSystem.comboMultiplier = 1 + (this.level - 1) * 0.2;
                }
                
                const baseScore = this.level * 100;
                const bonusScore = this.scoreSystem.timeBonus + this.scoreSystem.stabilityBonus + this.scoreSystem.efficiencyBonus;
                const finalScore = Math.floor((baseScore + bonusScore) * this.scoreSystem.comboMultiplier);
                
                return {
                    baseScore,
                    timeBonus: this.scoreSystem.timeBonus,
                    stabilityBonus: this.scoreSystem.stabilityBonus,
                    efficiencyBonus: this.scoreSystem.efficiencyBonus,
                    comboMultiplier: this.scoreSystem.comboMultiplier,
                    finalScore
                };
            }

            resetScoreSystem() {
                this.scoreSystem.totalStabilityScore = 0;
                this.scoreSystem.stabilityChecks = 0;
                this.scoreSystem.timeBonus = 0;
                this.scoreSystem.stabilityBonus = 0;
                this.scoreSystem.efficiencyBonus = 0;
            }

            collectPowerUp(powerUp) {
                powerUp.collected = true;
                powerUp.mesh.visible = false;
                
                // 파워업 효과 활성화
                const now = Date.now();
                const powerUpData = this.activePowerUps[powerUp.type];
                powerUpData.active = true;
                powerUpData.endTime = now + powerUpData.duration;
                
                // 파워업별 특별한 파티클 효과
                const particleType = powerUp.type === 'slowMotion' ? 'fire' : 
                                   powerUp.type === 'safeZone' ? 'smoke' : 'default';
                this.createParticles(powerUp.mesh.position, powerUp.mesh.material.color.getHex(), 80, particleType);
                
                // UI 메시지 표시
                const messages = {
                    slowMotion: '⏰ 슬로우모션 활성화!',
                    safeZone: '🛡️ 안전지대 활성화!',
                    extendedRange: '🔗 거리 확장 활성화!'
                };
                
                this.showPowerUpMessage(messages[powerUp.type]);
                
                console.log(`파워업 수집: ${powerUp.type}`);
            }

            showPowerUpMessage(message) {
                const existingMessage = document.getElementById('powerUpMessage');
                if (existingMessage) {
                    existingMessage.remove();
                }
                
                const messageDiv = document.createElement('div');
                messageDiv.id = 'powerUpMessage';
                messageDiv.style.cssText = `
                    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                    background: rgba(0, 0, 0, 0.8); color: white; padding: 20px 40px;
                    border-radius: 10px; font-size: 24px; font-weight: bold;
                    z-index: 1000; pointer-events: none;
                `;
                messageDiv.textContent = message;
                document.body.appendChild(messageDiv);
                
                setTimeout(() => {
                    if (messageDiv.parentNode) {
                        messageDiv.parentNode.removeChild(messageDiv);
                    }
                }, 3000);
            }

            updatePowerUps() {
                const now = Date.now();
                
                // 파워업 회전 효과
                this.powerUps.forEach(powerUp => {
                    if (!powerUp.collected) {
                        powerUp.mesh.rotation.y += powerUp.mesh.userData.rotationSpeed;
                        powerUp.mesh.position.y = 1 + Math.sin(now * 0.005 + powerUp.mesh.position.x) * 0.2;
                    }
                });
                
                // 활성 파워업 시간 체크
                Object.keys(this.activePowerUps).forEach(key => {
                    const powerUp = this.activePowerUps[key];
                    if (powerUp.active && now > powerUp.endTime) {
                        powerUp.active = false;
                        console.log(`파워업 종료: ${key}`);
                    }
                });
            }

            createParticles(position, color, count, type = 'default') {
                const geometry = new THREE.BufferGeometry();
                const vertices = [];
                const velocities = [];
                
                for (let i = 0; i < count; i++) {
                    // 위치 설정
                    const x = position.x + (Math.random() - 0.5) * 2;
                    const y = position.y + Math.random() * 1;
                    const z = position.z + (Math.random() - 0.5) * 2;
                    vertices.push(x, y, z);
                    
                    // 파티클 타입별 속도 설정
                    let vx, vy, vz;
                    switch(type) {
                        case 'cream':
                            vx = (Math.random() - 0.5) * 0.1;
                            vy = Math.random() * 0.05 + 0.02;
                            vz = (Math.random() - 0.5) * 0.1;
                            break;
                        case 'smoke':
                            vx = (Math.random() - 0.5) * 0.02;
                            vy = Math.random() * 0.08 + 0.04;
                            vz = (Math.random() - 0.5) * 0.02;
                            break;
                        case 'fire':
                            vx = (Math.random() - 0.5) * 0.15;
                            vy = Math.random() * 0.1 + 0.05;
                            vz = (Math.random() - 0.5) * 0.15;
                            break;
                        default:
                            vx = (Math.random() - 0.5) * 0.05;
                            vy = Math.random() * 0.05;
                            vz = (Math.random() - 0.5) * 0.05;
                    }
                    velocities.push(vx, vy, vz);
                }
                
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                
                // 파티클 타입별 재질 설정
                let material;
                switch(type) {
                    case 'cream':
                        material = new THREE.PointsMaterial({ 
                            color: 0xfff8dc, 
                            size: 0.3,
                            transparent: true,
                            opacity: 0.8,
                            blending: THREE.AdditiveBlending
                        });
                        break;
                    case 'smoke':
                        material = new THREE.PointsMaterial({ 
                            color: 0x666666, 
                            size: 0.4,
                            transparent: true,
                            opacity: 0.6,
                            blending: THREE.NormalBlending
                        });
                        break;
                    case 'fire':
                        material = new THREE.PointsMaterial({ 
                            color: color || 0xff4500, 
                            size: 0.25,
                            transparent: true,
                            opacity: 0.9,
                            blending: THREE.AdditiveBlending
                        });
                        break;
                    default:
                        material = new THREE.PointsMaterial({ 
                            color: color, 
                            size: 0.2,
                            transparent: true,
                            opacity: 0.7
                        });
                }
                
                const particles = new THREE.Points(geometry, material);
                this.scene.add(particles);
                
                this.particles.push({ 
                    mesh: particles, 
                    velocities: velocities,
                    life: type === 'smoke' ? 150 : type === 'fire' ? 80 : 100,
                    maxLife: type === 'smoke' ? 150 : type === 'fire' ? 80 : 100,
                    type: type
                });
            }

            updateParticles() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    const positions = p.mesh.geometry.attributes.position.array;
                    const velocities = p.velocities;
                    
                    // velocities가 없는 경우 (기본 파티클) 스킵
                    if (!velocities) {
                        p.life--;
                        if (p.life <= 0) {
                            this.scene.remove(p.mesh);
                            this.particles.splice(i, 1);
                        }
                        continue;
                    }
                    
                    // 각 파티클 위치 업데이트
                    for (let j = 0; j < positions.length; j += 3) {
                        positions[j] += velocities[j];         // x
                        positions[j + 1] += velocities[j + 1]; // y
                        positions[j + 2] += velocities[j + 2]; // z
                        
                        // 중력 적용
                        if (p.type !== 'smoke') {
                            velocities[j + 1] -= 0.001; // y 속도에 중력 적용
                        }
                        
                        // 파티클 타입별 특수 효과
                        switch(p.type) {
                            case 'fire':
                                // 불꽃은 위로 올라가면서 흔들림
                                velocities[j] += (Math.random() - 0.5) * 0.002;
                                velocities[j + 2] += (Math.random() - 0.5) * 0.002;
                                break;
                            case 'smoke':
                                // 연기는 천천히 퍼짐
                                velocities[j] *= 1.01;
                                velocities[j + 2] *= 1.01;
                                break;
                            case 'cream':
                                // 크림은 아래로 떨어짐
                                velocities[j] *= 0.98;
                                velocities[j + 2] *= 0.98;
                                break;
                        }
                    }
                    
                    p.mesh.geometry.attributes.position.needsUpdate = true;
                    
                    // 생명력과 투명도 업데이트
                    p.life--;
                    const lifeRatio = p.life / p.maxLife;
                    
                    // 타입별 투명도 변화
                    switch(p.type) {
                        case 'smoke':
                            p.mesh.material.opacity = lifeRatio * 0.6;
                            break;
                        case 'fire':
                            p.mesh.material.opacity = lifeRatio * 0.9;
                            // 불꽃 색상 변화 (빨강 -> 주황 -> 노랑)
                            const fireColor = new THREE.Color();
                            fireColor.setHSL(0.1 * (1 - lifeRatio), 1, 0.5);
                            p.mesh.material.color = fireColor;
                            break;
                        default:
                            p.mesh.material.opacity = lifeRatio * 0.7;
                    }
                    
                    if (p.life <= 0 || p.mesh.material.opacity <= 0) {
                        this.scene.remove(p.mesh);
                        this.particles.splice(i, 1);
                    }
                }
            }

            startCameraShake(intensity, duration) {
                this.cameraShake.intensity = intensity;
                this.cameraShake.decay = intensity / duration;
                this.cameraShake.startTime = Date.now();
            }

            updateCameraShake() {
                if (this.cameraShake.intensity > 0) {
                    const elapsed = Date.now() - this.cameraShake.startTime;
                    const currentIntensity = Math.max(0, this.cameraShake.intensity - this.cameraShake.decay * elapsed);

                    this.camera.position.x += (Math.random() - 0.5) * currentIntensity;
                    this.camera.position.y += (Math.random() - 0.5) * currentIntensity;

                    if (currentIntensity <= 0) {
                        this.cameraShake.intensity = 0;
                    }
                }
            }

            resetGame(isLevelUp = false) {
                if (!isLevelUp && Object.keys(this.players).length < 2) {
                    window.location.reload();
                    return;
                }

                if (!isLevelUp) {
                    this.level = 1;
                    this.currentScore = 0;
                    this.scoreSystem.comboMultiplier = 1;
                    
                    // 타이머 초기화
                    if (this.gameMode === 'timeAttack') {
                        this.timeRemaining = this.timeLimit;
                    }
                }

                // 파워업 효과 초기화
                Object.keys(this.activePowerUps).forEach(key => {
                    this.activePowerUps[key].active = false;
                    this.activePowerUps[key].endTime = 0;
                });

                this.resetScoreSystem();
                this.updateScoreDisplay();

                this.createLevel();

                const playerIds = Object.keys(this.players);
                if (playerIds.length >= 1) this.players[playerIds[0]].mesh.position.set(-2, 0, 0);
                if (playerIds.length >= 2) this.players[playerIds[1]].mesh.position.set(2, 0, 0);

                if (this.cake.mesh) {
                    this.cake.mesh.position.set(0, 0, 0);
                    this.cake.mesh.rotation.set(0, 0, 0);
                }

                this.resetButton.style.display = 'none';
                this.gameState = 'ready';
                this.messageBox.textContent = isLevelUp ? `레벨 ${this.level} 시작!` : '3초 후 다시 시작!';
                this.messageBox.style.display = 'flex';

                setTimeout(() => {
                    this.gameState = 'playing';
                    this.messageBox.style.display = 'none';
                    this.scoreSystem.levelStartTime = Date.now(); // 레벨 시작 시간 기록
                    this.bgm.play().catch(e => console.log("BGM play failed:", e));
                }, 3000);
            }

            updateCamera() {
                if (!this.cake.mesh) return;
                const targetPosition = new THREE.Vector3();
                targetPosition.copy(this.cake.mesh.position);
                targetPosition.y += 15;
                targetPosition.z += 10;
                this.camera.position.lerp(targetPosition, 0.05);
                this.camera.lookAt(this.cake.mesh.position);
            }

            updateDynamicObstacles() {
                const roadLimit = this.roadWidth / 2 - 1.5; // 장애물 반지름 고려
                const speedMultiplier = this.activePowerUps.slowMotion.active ? 0.3 : 1.0; // 슬로우모션 효과
                
                this.obstacles.forEach(obstacle => {
                    if (obstacle.userData.moveDirection) { // 움직이는 장애물
                        obstacle.position.x += obstacle.userData.moveDirection * obstacle.userData.moveSpeed * speedMultiplier;
                        if (obstacle.position.x > roadLimit || obstacle.position.x < -roadLimit) {
                            obstacle.userData.moveDirection *= -1; // 방향 반전
                        }
                    }
                    if (obstacle.userData.rotationSpeed) { // 회전하는 장애물
                        obstacle.rotation.y += obstacle.userData.rotationSpeed * speedMultiplier;
                    }
                });
            }

            animate() {
                requestAnimationFrame(this.animate);
                
                // 커스텀 애니메이션 시스템 업데이트 (항상 실행)
                const deltaTime = this.clock.getDelta();
                // 모든 플레이어의 애니메이션 업데이트
                Object.values(this.players).forEach(player => {
                    if (player.mesh && player.mesh.userData.bodyParts) {
                        this.updatePlayerAnimation(player, player.currentAnimation || 'idle');
                    }
                });
                
                if (this.gameState === 'playing') {
                    this.updateCakePosition();
                    this.checkCollisions();
                    this.updateDynamicObstacles();
                    this.updatePowerUps();
                    this.updateGameTimer();
                } else {
                    this.updatePowerUps(); // 게임 진행 중이 아닐 때도 파워업 애니메이션 유지
                }
                this.updateCamera();
                this.updateParticles();
                this.updateCameraShake();
                this.stars.rotation.y += 0.0001; // 별 배경 움직임
                this.renderer.render(this.scene, this.camera);
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            makeTextSprite(message, parameters) {
                const fontface = parameters.hasOwnProperty("fontface") ? parameters["fontface"] : "Arial";
                const fontsize = parameters.hasOwnProperty("fontsize") ? parameters["fontsize"] : 18;
                const borderThickness = parameters.hasOwnProperty("borderThickness") ? parameters["borderThickness"] : 4;
                const borderColor = parameters.hasOwnProperty("borderColor") ? parameters["borderColor"] : { r:0, g:0, b:0, a:1.0 };
                const backgroundColor = parameters.hasOwnProperty("backgroundColor") ? parameters["backgroundColor"] : { r:255, g:255, b:255, a:1.0 };

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                context.font = "Bold " + fontsize + "px " + fontface;

                const metrics = context.measureText(message);
                const textWidth = metrics.width;

                context.fillStyle   = "rgba(" + backgroundColor.r + "," + backgroundColor.g + "," + backgroundColor.b + "," + backgroundColor.a + ")";
                context.strokeStyle = "rgba(" + borderColor.r + "," + borderColor.g + "," + borderColor.b + "," + borderColor.a + ")";

                context.lineWidth = borderThickness;
                // roundRect(context, borderThickness/2, borderThickness/2, textWidth + borderThickness, fontsize * 1.4 + borderThickness, 6);

                context.fillStyle = "rgba(255, 255, 255, 1.0)";
                context.fillText(message, borderThickness, fontsize + borderThickness);

                const texture = new THREE.Texture(canvas);
                texture.needsUpdate = true;

                const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
                const sprite = new THREE.Sprite(spriteMaterial);
                sprite.scale.set(8, 4, 1.0);
                return sprite;
            }
        }

        window.onload = () => new CakeDeliveryGame();
    </script>
</body>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚩 Signal Flags - Sensor Game Hub</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #16a34a;
            --warning: #f59e0b;
            --error: #ef4444;
            --background: #0f172a;
            --surface: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border: #475569;
            --male-color: #3b82f6;
            --female-color: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--background), #020617);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 헤더 */
        .game-header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
        }

        .session-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, var(--primary), var(--female-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .session-info {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
            display: none;
            max-width: 400px;
        }

        .session-info.visible {
            display: block;
        }

        .session-code {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 1rem;
            letter-spacing: 0.2em;
        }

        .qr-container {
            margin-bottom: 1rem;
        }

        .connection-status {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .sensor-status {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .sensor-connected {
            background: rgba(22, 163, 74, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .sensor-disconnected {
            background: rgba(100, 116, 139, 0.2);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        /* 게임 아레나 */
        .game-arena {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 50;
        }

        .game-status {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 2rem;
            padding: 1.5rem 3rem;
            background: rgba(30, 41, 59, 0.9);
            border-radius: 1rem;
            border: 2px solid var(--border);
            backdrop-filter: blur(15px);
        }

        .game-status.ready {
            border-color: var(--success);
            color: var(--success);
        }

        .game-status.playing {
            border-color: var(--warning);
            color: var(--warning);
        }

        .gameplay-area {
            display: none;
        }

        .gameplay-area.visible {
            display: block;
        }

        .round-display {
            margin-bottom: 2rem;
        }

        .round-info {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .command-display {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 1.5rem;
            padding: 3rem;
            margin-bottom: 2rem;
            border: 3px solid;
        }

        .command-display.male {
            border-color: var(--male-color);
        }

        .command-display.female {
            border-color: var(--female-color);
        }

        .commander-icon {
            font-size: 6rem;
            margin-bottom: 1rem;
        }

        .command-text {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .command-text.male {
            color: var(--male-color);
        }

        .command-text.female {
            color: var(--female-color);
        }

        .timer-container {
            margin-top: 1rem;
        }

        .timer-bar {
            width: 300px;
            height: 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            overflow: hidden;
            margin: 0 auto;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--warning), var(--error));
            border-radius: 6px;
            transition: width 0.1s linear;
            width: 100%;
        }

        /* 점수판 */
        .scoreboard {
            position: absolute;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
            z-index: 60;
            min-width: 220px;
            display: none;
        }

        .scoreboard.visible {
            display: block;
        }

        .scoreboard h3 {
            color: var(--primary);
            margin-bottom: 1.2rem;
            text-align: center;
            font-size: 1.2rem;
        }

        .player-score {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.5rem;
            border-left: 3px solid;
        }

        .player-score.player1 {
            border-left-color: var(--success);
        }

        .player-score.player2 {
            border-left-color: var(--female-color);
        }

        .player-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-primary);
        }

        .game-stats {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .stat-label {
            color: var(--text-secondary);
        }

        .stat-value {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* 결과 화면 */
        .result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 500;
            backdrop-filter: blur(10px);
        }

        .result-overlay.visible {
            display: flex;
        }

        .result-content {
            text-align: center;
            max-width: 500px;
            padding: 3rem;
            background: rgba(30, 41, 59, 0.95);
            border-radius: 2rem;
            border: 2px solid;
        }

        .result-content.winner {
            border-color: var(--success);
        }

        .result-content.tie {
            border-color: var(--warning);
        }

        .result-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .result-subtitle {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--text-secondary);
        }

        .final-scores {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .final-score {
            text-align: center;
            padding: 1rem;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.05);
        }

        .final-score-label {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .final-score-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--text-primary);
        }

        /* 컨트롤 패널 */
        .control-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1.5rem;
            z-index: 100;
        }

        .control-btn {
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .control-btn.start {
            background: linear-gradient(135deg, var(--success), #059669);
        }

        .control-btn.restart {
            background: linear-gradient(135deg, var(--warning), #d97706);
        }

        .control-btn.home {
            background: linear-gradient(135deg, #64748b, #475569);
        }

        /* 로딩 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(59, 130, 246, 0.3);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 로딩 오버레이 -->
        <div class="loading-overlay hidden" id="loadingOverlay">
            <div class="loading-spinner"></div>
        </div>

        <!-- 상단 세션 정보 -->
        <div class="game-header">
            <div class="session-title">🚩 Signal Flags</div>
            <div class="session-info" id="sessionInfo">
                <div class="session-code" id="sessionCode">----</div>
                <div class="qr-container" id="qrContainer">
                    <div style="color: var(--text-secondary); font-size: 0.9rem;">QR 코드 생성 중...</div>
                </div>
                <div class="connection-status">
                    <div class="sensor-status sensor-disconnected" id="sensor1Status">
                        🚩 Player 1: 대기중
                    </div>
                    <div class="sensor-status sensor-disconnected" id="sensor2Status">
                        🚩 Player 2: 대기중
                    </div>
                </div>
            </div>
        </div>

        <!-- 게임 아레나 -->
        <div class="game-arena">
            <!-- 게임 상태 표시 -->
            <div class="game-status" id="gameStatus">
                🎯 두 명의 플레이어 연결을 기다리는 중...
            </div>

            <!-- 게임플레이 영역 -->
            <div class="gameplay-area" id="gameplayArea">
                <div class="round-display">
                    <div class="round-info" id="roundInfo">라운드 1 / 10</div>
                </div>
                
                <div class="command-display" id="commandDisplay">
                    <div class="commander-icon" id="commanderIcon">🚩</div>
                    <div class="command-text" id="commandText">준비하세요!</div>
                    <div class="timer-container">
                        <div class="timer-bar">
                            <div class="timer-fill" id="timerFill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 점수판 -->
        <div class="scoreboard" id="scoreboard">
            <h3>🏆 점수판</h3>
            <div class="player-score player1">
                <span class="player-name">Player 1</span>
                <span class="score-value" id="score1">0</span>
            </div>
            <div class="player-score player2">
                <span class="player-name">Player 2</span>
                <span class="score-value" id="score2">0</span>
            </div>
            <div class="game-stats">
                <div class="stat-item">
                    <span class="stat-label">라운드:</span>
                    <span class="stat-value" id="currentRound">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">응답 완료:</span>
                    <span class="stat-value" id="responseCount">0/2</span>
                </div>
            </div>
        </div>

        <!-- 결과 오버레이 -->
        <div class="result-overlay" id="resultOverlay">
            <div class="result-content" id="resultContent">
                <div class="result-title" id="resultTitle">🏆 승리!</div>
                <div class="result-subtitle" id="resultSubtitle">축하합니다!</div>
                <div class="final-scores">
                    <div class="final-score">
                        <div class="final-score-label">Player 1</div>
                        <div class="final-score-value" id="finalScore1">0</div>
                    </div>
                    <div class="final-score">
                        <div class="final-score-label">Player 2</div>
                        <div class="final-score-value" id="finalScore2">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 컨트롤 패널 -->
        <div class="control-panel">
            <button class="control-btn start" id="startBtn" onclick="startGame()" disabled>
                🚩 게임 시작
            </button>
            <button class="control-btn restart" id="restartBtn" onclick="restartGame()">
                🔄 다시 시작
            </button>
            <a href="/" class="control-btn home">🏠 허브로</a>
        </div>
    </div>

    <!-- Socket.IO 및 SDK 로드 -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/SessionSDK.js"></script>
    
    <!-- QR 코드 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <script>
        class SignalFlagsGame {
            constructor() {
                console.log('🚩 Signal Flags 게임 초기화 시작');
                
                // SDK 초기화
                this.sdk = new SessionSDK({
                    gameType: 'dual',
                    gameName: 'Signal Flags'
                });

                // 게임 상태
                this.gameState = 'waiting'; // waiting, ready, playing, finished
                this.connectedSensors = new Map();
                this.session = null;

                // 게임 설정
                this.config = {
                    totalRounds: 10,
                    responseTime: 4000, // 4초
                    roundInterval: 1500, // 1.5초 간격
                    commands: ['up', 'down', 'left', 'right'],
                    genders: ['male', 'female']
                };

                // 게임 데이터
                this.gameData = {
                    currentRound: 0,
                    maxRounds: this.config.totalRounds,
                    currentCommand: null,
                    currentGender: null,
                    roundStartTime: 0,
                    playerScores: { player1: 0, player2: 0 },
                    playerResponses: new Map(),
                    responseCount: 0
                };

                // 타이머
                this.gameTimer = null;
                this.responseTimer = null;

                // DOM 요소들
                this.elements = {
                    sessionInfo: document.getElementById('sessionInfo'),
                    sessionCode: document.getElementById('sessionCode'),
                    qrContainer: document.getElementById('qrContainer'),
                    sensor1Status: document.getElementById('sensor1Status'),
                    sensor2Status: document.getElementById('sensor2Status'),
                    gameStatus: document.getElementById('gameStatus'),
                    gameplayArea: document.getElementById('gameplayArea'),
                    commandDisplay: document.getElementById('commandDisplay'),
                    commanderIcon: document.getElementById('commanderIcon'),
                    commandText: document.getElementById('commandText'),
                    roundInfo: document.getElementById('roundInfo'),
                    timerFill: document.getElementById('timerFill'),
                    scoreboard: document.getElementById('scoreboard'),
                    score1: document.getElementById('score1'),
                    score2: document.getElementById('score2'),
                    currentRound: document.getElementById('currentRound'),
                    responseCount: document.getElementById('responseCount'),
                    resultOverlay: document.getElementById('resultOverlay'),
                    resultContent: document.getElementById('resultContent'),
                    resultTitle: document.getElementById('resultTitle'),
                    resultSubtitle: document.getElementById('resultSubtitle'),
                    finalScore1: document.getElementById('finalScore1'),
                    finalScore2: document.getElementById('finalScore2'),
                    loadingOverlay: document.getElementById('loadingOverlay'),
                    startBtn: document.getElementById('startBtn'),
                    restartBtn: document.getElementById('restartBtn')
                };

                this.initializeGame();
                this.setupEvents();
                console.log('✅ Signal Flags 게임 초기화 완료');
            }

            initializeGame() {
                // 로딩 표시
                this.showLoading(true);
                
                setTimeout(() => {
                    this.showLoading(false);
                }, 1000);
            }

            setupEvents() {
                // SDK 이벤트 처리
                this.sdk.on('connected', () => {
                    console.log('✅ 서버 연결 완료');
                    this.createSession();
                });

                this.sdk.on('session-created', (event) => {
                    const session = event.detail || event;
                    console.log('🎯 세션 생성 완료:', session);
                    this.session = session;
                    this.displaySessionInfo(session);
                });

                this.sdk.on('sensor-connected', (event) => {
                    const data = event.detail || event;
                    console.log('📱 센서 연결:', data);
                    this.handleSensorConnected(data);
                });

                this.sdk.on('sensor-disconnected', (event) => {
                    const data = event.detail || event;
                    console.log('📱 센서 연결 해제:', data);
                    this.handleSensorDisconnected(data);
                });

                this.sdk.on('game-ready', (event) => {
                    console.log('🎮 게임 준비 완료');
                    this.handleGameReady();
                });

                // Signal Flags 전용 이벤트
                this.setupSignalFlagsEvents();

                // 키보드 이벤트 (개발/테스트용)
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'r' || e.key === 'R') {
                        this.restartGame();
                    } else if (e.key === ' ') {
                        e.preventDefault();
                        if (this.gameState === 'ready') {
                            this.startGame();
                        }
                    }
                });
            }

            setupSignalFlagsEvents() {
                // 소켓 연결 확인
                if (!this.sdk.socket) {
                    setTimeout(() => this.setupSignalFlagsEvents(), 100);
                    return;
                }

                // Signal Flags 전용 이벤트 리스너
                this.sdk.socket.on('signal-flags-response', (data) => {
                    console.log('📡 플레이어 응답 수신:', data);
                    this.handlePlayerResponse(data);
                });
            }

            async createSession() {
                try {
                    await this.sdk.createSession();
                } catch (error) {
                    console.error('❌ 세션 생성 실패:', error);
                    this.elements.gameStatus.textContent = '세션 생성 실패. 새로고침해주세요.';
                }
            }

            displaySessionInfo(session) {
                this.elements.sessionCode.textContent = session.sessionCode;
                this.elements.sessionInfo.classList.add('visible');
                
                // 전용 센서 클라이언트 QR 코드 생성
                const qrUrl = `${window.location.origin}/games/signal-flags/sensor-client.html?session=${session.sessionCode}`;
                
                if (typeof QRCode !== 'undefined') {
                    QRCode.toCanvas(document.createElement('canvas'), qrUrl, (error, canvas) => {
                        if (!error) {
                            canvas.style.width = '140px';
                            canvas.style.height = '140px';
                            this.elements.qrContainer.innerHTML = '';
                            this.elements.qrContainer.appendChild(canvas);
                        } else {
                            this.showQRCodeFallback(qrUrl);
                        }
                    });
                } else {
                    this.showQRCodeFallback(qrUrl);
                }
            }

            showQRCodeFallback(qrUrl) {
                const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(qrUrl)}`;
                const img = document.createElement('img');
                img.src = qrApiUrl;
                img.style.width = '140px';
                img.style.height = '140px';
                this.elements.qrContainer.innerHTML = '';
                this.elements.qrContainer.appendChild(img);
            }

            handleSensorConnected(data) {
                const sensorId = data.sensorId;
                this.connectedSensors.set(sensorId, {
                    id: sensorId,
                    connected: true,
                    lastActivity: Date.now()
                });

                this.updateSensorStatus();
                
                if (this.connectedSensors.size === 2) {
                    this.setGameState('ready');
                }
            }

            handleSensorDisconnected(data) {
                const sensorId = data.sensorId;
                this.connectedSensors.delete(sensorId);
                this.updateSensorStatus();
                
                if (this.connectedSensors.size < 2) {
                    this.setGameState('waiting');
                    this.elements.startBtn.disabled = true;
                }
            }

            updateSensorStatus() {
                const sensors = Array.from(this.connectedSensors.keys()).sort();
                
                // Player 1 상태
                const sensor1 = sensors[0];
                if (sensor1) {
                    this.elements.sensor1Status.textContent = '🚩 Player 1: 연결됨';
                    this.elements.sensor1Status.className = 'sensor-status sensor-connected';
                } else {
                    this.elements.sensor1Status.textContent = '🚩 Player 1: 대기중';
                    this.elements.sensor1Status.className = 'sensor-status sensor-disconnected';
                }

                // Player 2 상태
                const sensor2 = sensors[1];
                if (sensor2) {
                    this.elements.sensor2Status.textContent = '🚩 Player 2: 연결됨';
                    this.elements.sensor2Status.className = 'sensor-status sensor-connected';
                } else {
                    this.elements.sensor2Status.textContent = '🚩 Player 2: 대기중';
                    this.elements.sensor2Status.className = 'sensor-status sensor-disconnected';
                }
            }

            handleGameReady() {
                this.setGameState('ready');
                this.elements.startBtn.disabled = false;
            }

            setGameState(state) {
                this.gameState = state;
                
                const stateMessages = {
                    waiting: '🎯 두 명의 플레이어 연결을 기다리는 중...',
                    ready: '🚩 게임 준비 완료! 시작 버튼을 누르세요',
                    playing: '🎮 게임 진행 중...',
                    finished: '🏁 게임 종료'
                };

                this.elements.gameStatus.textContent = stateMessages[state] || '';
                this.elements.gameStatus.className = `game-status ${state}`;
                
                // UI 표시/숨김 처리
                switch (state) {
                    case 'waiting':
                        this.elements.gameplayArea.classList.remove('visible');
                        this.elements.scoreboard.classList.remove('visible');
                        break;
                        
                    case 'ready':
                        this.elements.gameplayArea.classList.add('visible');
                        this.elements.scoreboard.classList.add('visible');
                        break;
                        
                    case 'playing':
                        this.elements.startBtn.disabled = true;
                        break;
                        
                    case 'finished':
                        this.elements.startBtn.disabled = true;
                        this.showResults();
                        break;
                }
            }

            startGame() {
                if (this.gameState !== 'ready') return;
                if (this.connectedSensors.size < 2) {
                    alert('두 명의 플레이어가 모두 연결되어야 합니다!');
                    return;
                }

                console.log('🚩 게임 시작!');
                this.setGameState('playing');
                
                // 게임 데이터 초기화
                this.gameData = {
                    currentRound: 0,
                    maxRounds: this.config.totalRounds,
                    currentCommand: null,
                    currentGender: null,
                    roundStartTime: 0,
                    playerScores: { player1: 0, player2: 0 },
                    playerResponses: new Map(),
                    responseCount: 0
                };

                this.updateScoreboard();
                
                // 카운트다운 후 첫 라운드 시작
                this.showCountdown();
            }

            showCountdown() {
                let count = 3;
                const countdownInterval = setInterval(() => {
                    if (count > 0) {
                        this.elements.gameStatus.textContent = `게임 시작까지 ${count}초`;
                        count--;
                    } else {
                        this.elements.gameStatus.textContent = 'START!';
                        
                        setTimeout(() => {
                            this.elements.gameStatus.style.display = 'none';
                            this.startNextRound();
                        }, 500);
                        
                        clearInterval(countdownInterval);
                    }
                }, 1000);
            }

            startNextRound() {
                this.gameData.currentRound++;
                
                if (this.gameData.currentRound > this.gameData.maxRounds) {
                    this.endGame();
                    return;
                }

                // 랜덤 명령과 성별 선택
                this.gameData.currentCommand = this.config.commands[Math.floor(Math.random() * this.config.commands.length)];
                this.gameData.currentGender = this.config.genders[Math.floor(Math.random() * this.config.genders.length)];
                this.gameData.roundStartTime = Date.now();
                this.gameData.playerResponses.clear();
                this.gameData.responseCount = 0;

                this.updateRoundDisplay();
                this.playVoiceCommand();
                this.startResponseTimer();

                // 센서 클라이언트에 라운드 시작 알림
                if (this.sdk.socket) {
                    this.sdk.socket.emit('signal-flags-round-start', {
                        sessionCode: this.session.sessionCode,
                        round: this.gameData.currentRound,
                        command: this.gameData.currentCommand,
                        gender: this.gameData.currentGender
                    });
                }

                console.log(`🚩 라운드 ${this.gameData.currentRound}: ${this.gameData.currentGender} says "${this.gameData.currentCommand}"`);
            }

            updateRoundDisplay() {
                this.elements.roundInfo.textContent = `라운드 ${this.gameData.currentRound} / 10`;
                this.elements.currentRound.textContent = this.gameData.currentRound;
                
                // 성별 아이콘 업데이트
                this.elements.commanderIcon.textContent = this.gameData.currentGender === 'male' ? '👨' : '👩';
                
                // 명령 텍스트 업데이트
                this.elements.commandText.textContent = this.gameData.currentCommand.toUpperCase();
                this.elements.commandText.className = `command-text ${this.gameData.currentGender}`;
                this.elements.commandDisplay.className = `command-display ${this.gameData.currentGender}`;
            }

            playVoiceCommand() {
                // TTS 음성 재생
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(this.gameData.currentCommand.toUpperCase());
                    utterance.pitch = this.gameData.currentGender === 'male' ? 0.7 : 1.3;
                    utterance.rate = 1.2;
                    utterance.volume = 1.0;
                    
                    speechSynthesis.cancel();
                    speechSynthesis.speak(utterance);
                    console.log(`🎤 TTS 음성 재생: ${this.gameData.currentGender}_${this.gameData.currentCommand}`);
                }
            }

            startResponseTimer() {
                let timeLeft = this.config.responseTime;
                this.elements.timerFill.style.width = '100%';
                
                this.responseTimer = setInterval(() => {
                    timeLeft -= 100;
                    const percentage = (timeLeft / this.config.responseTime) * 100;
                    this.elements.timerFill.style.width = Math.max(0, percentage) + '%';
                    
                    if (timeLeft <= 0) {
                        this.endRound();
                    }
                }, 100);
            }

            handlePlayerResponse(data) {
                if (this.gameState !== 'playing') return;
                if (this.gameData.playerResponses.has(data.playerId)) return; // 이미 응답함
                
                const responseTime = Date.now() - this.gameData.roundStartTime;
                const expectedDirection = this.getExpectedDirection();
                const isCorrect = data.direction === expectedDirection;
                
                this.gameData.playerResponses.set(data.playerId, {
                    direction: data.direction,
                    responseTime: responseTime,
                    isCorrect: isCorrect
                });

                if (isCorrect) {
                    this.gameData.playerScores[`player${data.playerId}`]++;
                }

                this.gameData.responseCount++;
                this.updateScoreboard();

                console.log(`🎯 Player ${data.playerId} 응답: ${data.direction} (정답: ${expectedDirection}) ${isCorrect ? '✅' : '❌'}`);

                // 두 플레이어 모두 응답했으면 즉시 라운드 종료
                if (this.gameData.responseCount >= 2) {
                    console.log('🏁 모든 플레이어 응답 완료 - 즉시 라운드 종료');
                    setTimeout(() => this.endRound(), 200);
                }
            }

            getExpectedDirection() {
                const command = this.gameData.currentCommand;
                const gender = this.gameData.currentGender;
                
                // 여성의 명령은 그대로, 남성의 명령은 반대로
                if (gender === 'female') {
                    return command;
                } else {
                    // 남성의 명령은 반대로 수행
                    const oppositeMap = {
                        'up': 'down',
                        'down': 'up',
                        'left': 'right',
                        'right': 'left'
                    };
                    return oppositeMap[command];
                }
            }

            endRound() {
                if (this.responseTimer) {
                    clearInterval(this.responseTimer);
                    this.responseTimer = null;
                }

                // 라운드 결과를 센서 클라이언트에 전송
                if (this.sdk.socket) {
                    this.sdk.socket.emit('signal-flags-round-end', {
                        sessionCode: this.session.sessionCode,
                        round: this.gameData.currentRound,
                        responses: Object.fromEntries(this.gameData.playerResponses),
                        scores: this.gameData.playerScores
                    });
                }

                // 다음 라운드 준비
                setTimeout(() => {
                    this.startNextRound();
                }, this.config.roundInterval);
            }

            updateScoreboard() {
                this.elements.score1.textContent = this.gameData.playerScores.player1;
                this.elements.score2.textContent = this.gameData.playerScores.player2;
                this.elements.responseCount.textContent = `${this.gameData.responseCount}/2`;
            }

            endGame() {
                this.setGameState('finished');
                
                if (this.responseTimer) {
                    clearInterval(this.responseTimer);
                    this.responseTimer = null;
                }

                // 최종 점수 확인
                const score1 = this.gameData.playerScores.player1;
                const score2 = this.gameData.playerScores.player2;
                
                let resultTitle, resultSubtitle, resultClass, winner;
                
                if (score1 > score2) {
                    resultTitle = '🏆 Player 1 승리!';
                    resultSubtitle = '축하합니다!';
                    resultClass = 'winner';
                    winner = 1;
                } else if (score2 > score1) {
                    resultTitle = '🏆 Player 2 승리!';
                    resultSubtitle = '축하합니다!';
                    resultClass = 'winner';
                    winner = 2;
                } else {
                    resultTitle = '🤝 무승부!';
                    resultSubtitle = '훌륭한 경기였습니다!';
                    resultClass = 'tie';
                    winner = 0;
                }

                this.elements.resultTitle.textContent = resultTitle;
                this.elements.resultSubtitle.textContent = resultSubtitle;
                this.elements.resultContent.className = `result-content ${resultClass}`;
                this.elements.finalScore1.textContent = score1;
                this.elements.finalScore2.textContent = score2;

                // 센서 클라이언트에 게임 종료 알림
                if (this.sdk.socket) {
                    this.sdk.socket.emit('signal-flags-game-end', {
                        sessionCode: this.session.sessionCode,
                        winner: winner,
                        finalScores: {
                            player1: score1,
                            player2: score2
                        }
                    });
                }

                console.log(`🏁 게임 종료 - Player 1: ${score1}, Player 2: ${score2}, Winner: ${winner}`);
            }

            showResults() {
                this.elements.resultOverlay.classList.add('visible');
                this.elements.startBtn.disabled = false;
            }

            restartGame() {
                console.log('🔄 게임 재시작');
                
                // 타이머들 정리
                if (this.gameTimer) {
                    clearInterval(this.gameTimer);
                    this.gameTimer = null;
                }
                if (this.responseTimer) {
                    clearInterval(this.responseTimer);
                    this.responseTimer = null;
                }

                // UI 초기화
                this.elements.resultOverlay.classList.remove('visible');
                this.elements.gameStatus.style.display = 'block';
                this.elements.timerFill.style.width = '100%';

                // 게임 데이터 초기화
                this.gameData = {
                    currentRound: 0,
                    maxRounds: this.config.totalRounds,
                    currentCommand: null,
                    currentGender: null,
                    roundStartTime: 0,
                    playerScores: { player1: 0, player2: 0 },
                    playerResponses: new Map(),
                    responseCount: 0
                };

                this.updateScoreboard();
                
                // 연결된 센서가 있으면 ready 상태로, 없으면 waiting 상태로
                if (this.connectedSensors.size >= 2) {
                    this.setGameState('ready');
                    this.elements.startBtn.disabled = false;
                } else {
                    this.setGameState('waiting');
                    this.elements.startBtn.disabled = true;
                }

                // 센서 클라이언트에 재시작 알림
                if (this.sdk.socket) {
                    this.sdk.socket.emit('signal-flags-restart', {
                        sessionCode: this.session.sessionCode
                    });
                }
            }

            showLoading(show) {
                if (show) {
                    this.elements.loadingOverlay.classList.remove('hidden');
                } else {
                    this.elements.loadingOverlay.classList.add('hidden');
                }
            }

            cleanup() {
                // 모든 타이머 정리
                if (this.gameTimer) clearInterval(this.gameTimer);
                if (this.responseTimer) clearInterval(this.responseTimer);

                // SDK 정리
                if (this.sdk) {
                    this.sdk.cleanup();
                }

                console.log('🧹 게임 정리 완료');
            }
        }

        // 게임 인스턴스 생성
        let game;

        // 전역 함수들
        function startGame() {
            if (game) {
                game.startGame();
            }
        }

        function restartGame() {
            if (game) {
                game.restartGame();
            }
        }

        // 페이지 로드 완료 후 게임 시작
        document.addEventListener('DOMContentLoaded', () => {
            game = new SignalFlagsGame();
        });

        // 페이지 언로드 시 정리
        window.addEventListener('beforeunload', () => {
            if (game) {
                game.cleanup();
            }
        });
    </script>
</body>
</html>
